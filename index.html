<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>화장실 지도</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --G:#1a6b3c; --GL:#22a75a; --GP:#e6f7ed; --GM:#b7e4c7;
  --BL:#1971c2; --RD:#e03131; --OR:#e67700;
  --W:#fff; --S2:#f8f9fa; --S3:#f1f3f5;
  --BD:#dee2e6; --BS:#e9ecef;
  --T:#212529; --T2:#495057; --T3:#868e96;
  --SH:0 4px 16px rgba(0,0,0,.1);
  --R:12px; --RS:8px; --RL:20px; --RF:999px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Pretendard',sans-serif;color:var(--T);overflow:hidden;}

/* ═══ 지도 ═══ */
#map{position:fixed;inset:0;z-index:1;}

/* ═══ 상단바 ═══ */
.topbar{position:fixed;top:0;left:0;right:0;z-index:500;padding:11px 13px 0;pointer-events:none;}
.topbar>*{pointer-events:all;}
.tb1{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.logo{
  display:flex;align-items:center;gap:7px;
  background:var(--G);color:#fff;
  padding:8px 13px 8px 10px;border-radius:var(--RF);
  font-size:14px;font-weight:800;white-space:nowrap;
  box-shadow:0 4px 14px rgba(26,107,60,.4);flex-shrink:0;
}
.logo-sub{font-size:9px;font-weight:500;opacity:.7;display:block;margin-top:-1px;}
.sbox{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--W);border:1.5px solid var(--BS);
  border-radius:var(--RF);padding:0 14px;
  box-shadow:var(--SH);transition:border-color .2s;
}
.sbox:focus-within{border-color:var(--G);}
.sbox input{
  flex:1;border:none;background:none;
  font-family:'Pretendard',sans-serif;font-size:14px;
  color:var(--T);padding:10px 0;outline:none;
}
.sbox input::placeholder{color:var(--T3);}
.tb2{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;}
.tb2::-webkit-scrollbar{display:none;}
.fp{
  flex-shrink:0;height:31px;padding:0 12px;border-radius:var(--RF);
  border:1.5px solid var(--BD);background:var(--W);
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;color:var(--T3);
  cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.fp.on{background:var(--GP);border-color:var(--G);color:var(--G);}

/* ═══ FAB 버튼 ═══ */
.fabs{position:fixed;right:13px;top:50%;transform:translateY(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;}
.fab{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--SH);font-size:18px;transition:transform .15s;
}
.fab:active{transform:scale(.92);}
.fab-loc{background:var(--W);}
.fab-urg{background:var(--RD);animation:urgp 2s infinite;}
@keyframes urgp{0%,100%{box-shadow:0 0 0 0 rgba(224,49,49,.4)}60%{box-shadow:0 0 0 10px rgba(224,49,49,0)}}
.fab-kk{
  background:#FEE500;height:34px;width:auto;padding:0 11px;border-radius:var(--RF);
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:800;color:#1a1a1a;
}

/* ═══ 왼쪽 패널 (PC) / 하단 시트 (모바일) ═══ */
.panel{
  position:fixed;z-index:400;background:var(--W);
  display:flex;flex-direction:column;overflow:hidden;
  /* 모바일 기본: 하단 시트 */
  bottom:0;left:0;right:0;
  border-radius:var(--RL) var(--RL) 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.1);
  transition:transform .36s cubic-bezier(.32,.72,0,1);
  transform:translateY(calc(100% - 62px)); /* collapsed */
  max-height:82vh;
}
.panel.half{transform:translateY(calc(100% - 256px));}
.panel.full{transform:translateY(0);}

.grip-area{padding:10px 15px 5px;cursor:pointer;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;user-select:none;}
.grip{width:38px;height:4px;background:var(--BD);border-radius:var(--RF);}
.grip-row{width:100%;display:flex;justify-content:space-between;align-items:center;}
.grip-cnt{font-size:14px;font-weight:700;}
.grip-hint{font-size:11px;color:var(--T3);}

.sort-row{display:flex;gap:5px;padding:0 12px 9px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--BS);}
.sort-row::-webkit-scrollbar{display:none;}
.sc{
  flex-shrink:0;height:29px;padding:0 11px;border-radius:var(--RF);
  border:1.5px solid var(--BD);background:var(--S3);
  font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;color:var(--T3);cursor:pointer;
  display:flex;align-items:center;gap:3px;
}
.sc.on{background:var(--GP);border-color:var(--G);color:var(--G);}

.list-wrap{overflow-y:auto;flex:1;padding:7px 11px 14px;}
.list-wrap::-webkit-scrollbar{width:3px;}
.list-wrap::-webkit-scrollbar-thumb{background:var(--BD);border-radius:4px;}

.dbadge{
  padding:8px 13px;border-top:1px solid var(--BS);
  font-size:11px;color:var(--T3);
  display:flex;align-items:center;gap:5px;
  background:var(--S3);flex-shrink:0;
}
.dbadge strong{color:var(--G);font-weight:700;}

/* ═══ 화장실 카드 ═══ */
.tcard{
  background:var(--W);border:1.5px solid var(--BS);border-radius:var(--R);
  padding:13px;margin-bottom:7px;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.tcard::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;
  width:3px;background:transparent;border-radius:0 3px 3px 0;transition:background .2s;
}
.tcard.sel{border-color:var(--G);background:#fafffe;}
.tcard.sel::before{background:var(--G);}
.tc-r1{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:4px;}
.tc-name{font-size:14px;font-weight:700;line-height:1.35;flex:1;}
.tc-dist{font-size:11px;font-weight:700;color:var(--G);background:var(--GP);padding:3px 9px;border-radius:var(--RF);white-space:nowrap;flex-shrink:0;}
.tc-addr{font-size:11px;color:var(--T3);margin-bottom:7px;line-height:1.4;}
.tc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.pill{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;line-height:1.6;}
.p24{background:#e3f2fd;color:#1565c0;}
.pdis{background:#f3e5f5;color:#6a1b9a;}
.pbaby{background:#fff8e1;color:#e65100;}
.pccv{background:#e8eaf6;color:#283593;}
.pbell{background:#fce4ec;color:#880e4f;}
.tc-rat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--T3);}
.star{color:#ffc107;}

/* ═══ 상세 패널 ═══ */
.detail{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--W);border-radius:var(--RL) var(--RL) 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  transform:translateY(100%);
  transition:transform .36s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;
}
.detail.show{transform:translateY(0);}
.detail::-webkit-scrollbar{display:none;}

.d-grip{width:38px;height:4px;background:var(--BD);border-radius:var(--RF);margin:12px auto 0;}
.d-head{
  padding:14px 17px 15px;
  background:linear-gradient(145deg,var(--GP),var(--W));
  border-bottom:1px solid var(--BS);position:relative;
}
.d-close{
  position:absolute;top:12px;right:13px;width:28px;height:28px;border-radius:50%;
  border:none;background:rgba(0,0,0,.07);cursor:pointer;
  font-size:14px;color:var(--T3);display:flex;align-items:center;justify-content:center;
}
.d-name{font-size:17px;font-weight:900;line-height:1.3;margin-bottom:4px;padding-right:32px;}
.d-addr{font-size:12px;color:var(--T3);margin-bottom:9px;}
.d-tags{display:flex;gap:4px;flex-wrap:wrap;}
.d-body{padding:15px 17px 36px;}
.sec{font-size:10px;font-weight:700;color:var(--T3);letter-spacing:.8px;text-transform:uppercase;margin:15px 0 9px;}
.sec:first-child{margin-top:0;}

.r-block{display:flex;align-items:center;gap:13px;margin-bottom:13px;}
.r-big{font-size:38px;font-weight:900;line-height:1;}
.r-stars{font-size:15px;color:#ffc107;margin-bottom:3px;}
.r-cnt{font-size:12px;color:var(--T3);}

.v-box{background:var(--S3);border-radius:var(--R);padding:11px;margin-bottom:13px;}
.v-title{font-size:10px;font-weight:700;color:var(--T3);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.ldot{width:6px;height:6px;background:var(--RD);border-radius:50%;animation:blink 1.3s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.vi{
  background:var(--W);border:1.5px solid var(--BS);border-radius:var(--RS);
  padding:9px 10px;font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;transition:all .15s;
}
.vi:active,.vi.voted{background:var(--GP);border-color:var(--G);color:var(--G);}
.vi-cnt{font-size:13px;font-weight:800;}

.i-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px;}
.ig{background:var(--S3);border-radius:var(--RS);padding:10px 11px;}
.ig-l{font-size:10px;color:var(--T3);margin-bottom:3px;font-weight:500;}
.ig-v{font-size:12px;font-weight:700;line-height:1.3;}

.rev-list{margin-bottom:13px;}
.rev-item{border-bottom:1px solid var(--BS);padding:9px 0;}
.rev-item:last-child{border-bottom:none;}
.rev-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.rev-stars{font-size:11px;color:#ffc107;}
.rev-name{font-size:11px;font-weight:700;}
.rev-date{font-size:10px;color:var(--T3);margin-left:auto;}
.rev-txt{font-size:12px;line-height:1.6;color:var(--T2);}

.w-form{background:var(--S3);border-radius:var(--R);padding:12px;margin-bottom:11px;}
.w-label{font-size:11px;font-weight:700;color:var(--T3);margin-bottom:8px;}
.s-pick{display:flex;gap:7px;margin-bottom:8px;}
.s-pick span{font-size:26px;cursor:pointer;color:#ddd;transition:color .1s;line-height:1;}
.s-pick span.on{color:#ffc107;}
.rev-ta{
  width:100%;height:62px;border:1.5px solid var(--BD);border-radius:var(--RS);
  padding:9px;font-family:'Pretendard',sans-serif;font-size:13px;
  resize:none;outline:none;background:var(--W);
}
.rev-ta:focus{border-color:var(--G);}
.btn-rev{
  width:100%;background:var(--G);color:#fff;border:none;padding:11px;
  border-radius:var(--RS);font-family:'Pretendard',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;
}
.btn-nav{
  width:100%;background:var(--G);color:#fff;border:none;padding:15px;
  border-radius:var(--R);font-family:'Pretendard',sans-serif;
  font-size:15px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 14px rgba(26,107,60,.3);
}

/* ═══ 길찾기 패널 ═══ */
.route-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:700;
  background:var(--W);border-radius:var(--RL) var(--RL) 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  transform:translateY(100%);
  transition:transform .36s cubic-bezier(.32,.72,0,1);
  max-height:78vh;display:flex;flex-direction:column;
}
.route-panel.show{transform:translateY(0);}

.rp-grip{width:38px;height:4px;background:var(--BD);border-radius:var(--RF);margin:12px auto 0;flex-shrink:0;}
.rp-head{
  padding:11px 16px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--BS);flex-shrink:0;
}
.rp-title{font-size:13px;font-weight:800;color:var(--G);flex:1;margin-right:8px;}
.rp-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--T3);}

.mode-bar{display:flex;gap:7px;padding:11px 15px;border-bottom:1px solid var(--BS);flex-shrink:0;}
.mbt{
  flex:1;padding:10px 0;border:1.5px solid var(--BD);border-radius:var(--RS);
  background:var(--S3);font-family:'Pretendard',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--T3);transition:all .15s;
}
.mbt span{font-size:18px;}
.mbt.on{border-color:var(--G);background:var(--GP);color:var(--G);}

.rt-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:11px 15px;border-bottom:1px solid var(--BS);flex-shrink:0;}
.rts{background:var(--S3);border-radius:var(--RS);padding:10px 11px;}
.rts-l{font-size:10px;color:var(--T3);font-weight:500;margin-bottom:2px;}
.rts-v{font-size:20px;font-weight:900;color:var(--T);line-height:1.1;}
.rts-u{font-size:10px;color:var(--T3);}

.steps-wrap{overflow-y:auto;flex:1;padding:4px 15px 28px;}
.steps-wrap::-webkit-scrollbar{width:3px;}
.steps-wrap::-webkit-scrollbar-thumb{background:var(--BD);border-radius:4px;}

.step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--BS);align-items:flex-start;}
.step:last-child{border-bottom:none;}
.step-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.step-txt{font-size:13px;font-weight:500;line-height:1.4;color:var(--T);}
.step-sub{font-size:11px;color:var(--T3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{background:var(--S3);border:1px solid var(--BD);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;}
.badge-cross{background:#fff3cd;border-color:#ffc107;color:#856404;}
.badge-road{background:#e3f2fd;border-color:#90caf9;color:#1565c0;}

/* ═══ 긴급 모드 ═══ */
.urg{
  display:none;position:fixed;inset:0;z-index:9000;
  background:linear-gradient(160deg,#c92a2a,var(--RD));
  align-items:center;justify-content:center;flex-direction:column;
  gap:12px;padding:30px;text-align:center;
}
.urg.show{display:flex;}
.urg-emoji{font-size:64px;animation:shk .4s infinite;}
@keyframes shk{0%,100%{transform:rotate(-8deg) scale(1.05)}50%{transform:rotate(8deg) scale(1.05)}}
.urg-title{font-size:24px;font-weight:900;color:#fff;}
.urg-name{font-size:20px;font-weight:700;color:rgba(255,255,255,.92);}
.urg-dist{font-size:14px;color:rgba(255,255,255,.75);}
.urg-close{
  margin-top:12px;background:#fff;color:var(--RD);border:none;
  padding:13px 34px;border-radius:var(--RF);
  font-family:'Pretendard',sans-serif;font-size:15px;font-weight:800;cursor:pointer;
}

/* ═══ 토스트 ═══ */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(33,37,41,.92);color:#fff;padding:10px 22px;border-radius:var(--RF);
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .28s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ 로딩 ═══ */
.loading{
  position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:8000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:13px;
}
.spin{width:40px;height:40px;border:4px solid var(--GM);border-top-color:var(--G);border-radius:50%;animation:sp .75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.load-t{font-size:14px;font-weight:700;color:var(--G);}
.load-s{font-size:12px;color:var(--T3);}

/* ═══ PC 레이아웃 ═══ */
@media(min-width:768px){
  .panel{
    width:330px;height:100vh;max-height:100vh;
    border-radius:0;top:0;right:auto;bottom:auto;left:0;
    transform:none!important;
    box-shadow:2px 0 20px rgba(0,0,0,.08);
  }
  .grip-area{display:none;}
  .topbar{left:340px;}
  #map{left:330px;}
  .detail{
    left:330px;right:auto;width:340px;top:0;
    max-height:100vh;border-radius:0;overflow-y:auto;
    box-shadow:2px 0 20px rgba(0,0,0,.08);
  }
  .detail.show{transform:translateY(0);}
  .route-panel{
    left:330px;right:auto;width:340px;top:0;
    max-height:100vh;border-radius:0;
  }
  .route-panel.show{transform:translateY(0);}
  .fabs{right:14px;}
}
</style>
</head>
<body>

<div id="map"></div>

<!-- 상단바 -->
<div class="topbar">
  <div class="tb1">
    <div class="logo">
      🚻 화장실 지도
      <span class="logo-sub">전국 공중화장실</span>
    </div>
    <div class="sbox">
      <span style="color:var(--T3);font-size:15px">🔍</span>
      <input id="sinp" placeholder="화장실명, 주소 검색" oninput="doSearch(this.value)">
    </div>
  </div>
  <div class="tb2">
    <div class="fp on" onclick="setF('all',this)">전체</div>
    <div class="fp" onclick="setF('24h',this)">🌙 24시간</div>
    <div class="fp" onclick="setF('disabled',this)">♿ 장애인</div>
    <div class="fp" onclick="setF('baby',this)">👶 기저귀</div>
    <div class="fp" onclick="setF('cctv',this)">📹 CCTV</div>
    <div class="fp" onclick="setF('bell',this)">🔔 비상벨</div>
  </div>
</div>

<!-- FAB -->
<div class="fabs">
  <button class="fab fab-loc" id="locBtn" onclick="locate()">📍</button>
  <button class="fab fab-urg" onclick="showUrg()">🚨</button>
  <button class="fab fab-kk" id="kkBtn" onclick="kkLogin()">로그인</button>
</div>

<!-- 왼쪽/하단 패널 -->
<div class="panel" id="panel">
  <div class="grip-area" onclick="togglePanel()">
    <div class="grip"></div>
    <div class="grip-row">
      <span class="grip-cnt">주변 <strong id="cnt">0</strong>개 화장실</span>
      <span class="grip-hint">탭해서 펼치기</span>
    </div>
  </div>
  <div class="sort-row">
    <div class="sc on" onclick="setSort('dist',this)">📏 거리순</div>
    <div class="sc" onclick="setSort('rating',this)">⭐ 별점순</div>
    <div class="sc" onclick="setSort('name',this)">가나다순</div>
  </div>
  <div class="list-wrap" id="listWrap"></div>
  <div class="dbadge">📅 마지막 수정: <strong>2026-02-10</strong> · 행정안전부</div>
</div>

<!-- 상세 패널 -->
<div class="detail" id="detailPanel">
  <div class="d-grip"></div>
  <div class="d-head">
    <button class="d-close" onclick="closeDetail()">✕</button>
    <div class="d-name" id="dName"></div>
    <div class="d-addr" id="dAddr"></div>
    <div class="d-tags" id="dTags"></div>
  </div>
  <div class="d-body">
    <div class="sec">청결도 / 평점</div>
    <div class="r-block">
      <div class="r-big" id="dNum">-</div>
      <div>
        <div class="r-stars" id="dStars">☆☆☆☆☆</div>
        <div class="r-cnt" id="dCnt">아직 리뷰 없음</div>
      </div>
    </div>
    <div class="sec">실시간 현황</div>

<script>

// ──────────────────────────────────────────────────────

const KK_KEY = 'a08fe69a1355d47b0e5e2a4b337cfd5b';

async function loadKakaoSDK() {
  if (window.Kakao) { initKakao(); return; }
  await new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => { initKakao(); resolve(); };
    s.onerror = () => {
      // CDN 실패시 fallback
      const s2 = document.createElement('script');
      s2.src = 'https://developers.kakao.com/sdk/js/kakao.js';
      s2.onload = () => { initKakao(); resolve(); };
      s2.onerror = resolve;
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });
}
function initKakao() {
  if (window.Kakao && !Kakao.isInitialized()) {
    Kakao.init(KK_KEY);
    console.log('✅ 카카오 SDK 초기화 완료');
  }
}
loadKakaoSDK(); // 앱 시작시 미리 로드

function kkLogin() {
  // 이미 로그인 상태면 로그아웃
  if (currentUser) { kkLogout(); return; }

  // ★ 핵심: Kakao.Auth.login은 반드시 클릭 이벤트에서 동기적으로 호출해야 팝업 차단 안 됨
  // async/await 사용 금지 - 브라우저가 팝업을 차단함
  if (!window.Kakao || !Kakao.isInitialized()) {
    showToast('⏳ SDK 로딩 중... 잠시 후 다시 눌러주세요');
    // SDK 로드 후에도 다시 클릭해야 함 (팝업 차단 때문에 자동 호출 불가)
    loadKakaoSDK();
    return;
  }

  // 동기적으로 바로 로그인 팝업 호출
  try {
    Kakao.Auth.login({
      success: function(authObj) {
        console.log('✅ 카카오 로그인 성공', authObj);
        // 사용자 정보 요청
        Kakao.API.request({
          url: '/v2/user/me',
          success: function(res) {
            currentUser = {
              id: res.id,
              name: res.kakao_account?.profile?.nickname || '사용자',
              photo: res.kakao_account?.profile?.profile_image_url || ''
            };
            document.getElementById('kkBtn').textContent = currentUser.name.slice(0, 5);
            document.getElementById('revBtn').textContent = '리뷰 등록';
            showToast('✅ ' + currentUser.name + '님 환영해요!');
          },
          fail: function(err) {
            console.error('사용자 정보 오류:', err);
            showToast('❌ 사용자 정보를 가져오지 못했어요');
          }
        });
      },
      fail: function(err) {
        console.error('카카오 로그인 실패:', err);
        if (err.error === 'access_denied') {
          showToast('❌ 로그인을 취소했어요');
        } else if (err.error_description) {
          showToast('❌ ' + err.error_description);
        } else {
          showToast('❌ 로그인 실패 — 팝업 차단을 해제해주세요');
        }
      }
    });
  } catch(e) {
    console.error('카카오 Auth 오류:', e);
    showToast('❌ 카카오 로그인 오류: ' + e.message);
  }
}
function kkLogout() {
  if (window.Kakao && Kakao.Auth.getAccessToken()) {
    Kakao.Auth.logout(() => {
      currentUser = null;
      document.getElementById('kkBtn').textContent = '로그인';
      showToast('로그아웃 됐어요');
    });
  } else {
    currentUser = null;
    document.getElementById('kkBtn').textContent = '로그인';
  }
}

// ──────────────────────────────────────────────────────
// 전역 상태
// ──────────────────────────────────────────────────────
let map;
let uLat = 37.5550, uLng = 126.9707; // 기본: 서울
let uCircle = null, uPulse = null;    // 내 위치 마커 (항상 1개 유지)
let currentUser = null;
let selStars = 0;

// ▼ 핵심 버그 수정: openId로 현재 열린 화장실 추적
let openId = null;  // 현재 상세패널에 열린 화장실 id

let curMode = 'walk';
let routeTarget = null;       // 길찾기 대상 화장실
let routeLines = [];          // 지도에 그려진 경로 레이어
let routeController = null;   // fetch AbortController

let allData = [];     // 전체 화장실 데이터
let nearList = [];    // 거리 계산된 주변 목록
let dispList = [];    // 현재 화면에 표시중인 목록

let dotLayer = null;
let mrkLayer = [];

let curFilter = 'all';
let curSort = 'dist';
let panelState = 'collapsed';
let isLocating = false;

// ──────────────────────────────────────────────────────
// 지도 초기화
// ──────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: true })
    .setView([36.5, 127.8], 7);

  // OpenStreetMap 표준 타일 (건물 상세 표시)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19, minZoom: 5
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend moveend', renderByZoom);
  setTimeout(loadData, 150);
}

// ──────────────────────────────────────────────────────
// 데이터 로드
// ──────────────────────────────────────────────────────
function loadData() {
  try {
    if (typeof TOILET_DATA === 'undefined') throw new Error('데이터 없음');
    allData = TOILET_DATA.map(t => ({
      id: t.i, name: t.n, address: t.a, lat: t.la, lng: t.ln,
      hours: t.h, is24h: t.t === 1, disabled: t.d === 1,
      baby: t.b === 1, cctv: t.c === 1, bell: t.e === 1,
      rating: 0, reviewCnt: 0, reviews: [], votes: { paper:0, soap:0, smell:0, queue:0 }
    }));
    document.getElementById('loading').style.display = 'none';
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => { uLat = p.coords.latitude; uLng = p.coords.longitude; onLocated(); },
        () => onLocated()
      );
    } else onLocated();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showToast('❌ toilets_data.js 파일을 GitHub에 함께 올려주세요!');
  }
}

function onLocated() {
  map.setView([uLat, uLng], 16);
  placeUserMarker();
  updateNearby();
  renderByZoom();
}

// ──────────────────────────────────────────────────────
// 내 위치 마커 (중복 절대 안 생기게)
// ──────────────────────────────────────────────────────
function placeUserMarker() {
  // 기존 마커 제거 후 새로 생성
  if (uPulse) { try { map.removeLayer(uPulse); } catch(e){} uPulse = null; }
  if (uCircle) { try { map.removeLayer(uCircle); } catch(e){} uCircle = null; }

  uPulse = L.circleMarker([uLat, uLng], {
    radius: 18, fillColor: '#2196f3', color: 'transparent', fillOpacity: .15, weight: 0
  }).addTo(map);

  uCircle = L.circleMarker([uLat, uLng], {
    radius: 9, fillColor: '#2196f3', color: 'white', weight: 2.5, fillOpacity: 1
  }).addTo(map).bindPopup('<b>📍 내 위치</b>');
}

// ──────────────────────────────────────────────────────
// 내 위치 버튼 (중복 클릭 방지)
// ──────────────────────────────────────────────────────
function locate() {
  if (isLocating) return;
  isLocating = true;
  document.getElementById('locBtn').textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    p => {
      uLat = p.coords.latitude; uLng = p.coords.longitude;
      map.setView([uLat, uLng], 17);
      placeUserMarker();
      updateNearby();
      showToast('✅ 내 위치를 찾았어요!');
      document.getElementById('locBtn').textContent = '📍';
      isLocating = false;
    },
    () => {
      showToast('❌ 위치 권한을 허용해주세요');
      document.getElementById('locBtn').textContent = '📍';
      isLocating = false;
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ──────────────────────────────────────────────────────
// 주변 목록 업데이트
// ──────────────────────────────────────────────────────
function updateNearby() {
  nearList = allData
    .map(t => ({ ...t, dist: Math.round(haversine(uLat, uLng, t.lat, t.lng)) }))
    .sort((a, b) => a.dist - b.dist);

  const near5km = nearList.filter(t => t.dist <= 5000).slice(0, 50);
  renderList(near5km);
  if (db) loadFirebase(near5km.slice(0, 20));
}

async function loadFirebase(list) {
  try {
    const ids = list.map(t => String(t.id));
    for (let i = 0; i < ids.length; i += 10) {
      const snap = await db.collection('toilets')
        .where(firebase.firestore.FieldPath.documentId(), 'in', ids.slice(i, i + 10)).get();
      snap.forEach(doc => {
        const t = allData.find(x => String(x.id) === doc.id);
        if (t) {
          const d = doc.data();
          t.rating = d.rating || 0;
          t.reviewCnt = d.reviewCount || 0;
          t.reviews = d.reviews || [];
          t.votes = d.votes || { paper:0, soap:0, smell:0, queue:0 };
        }
      });
    }
  } catch(e) { /* Firebase 오류 무시 */ }
}

// ──────────────────────────────────────────────────────
// 줌 기반 마커 렌더링
// ──────────────────────────────────────────────────────
function renderByZoom() {
  const z = map.getZoom();
  const b = map.getBounds();
  clearMapMarkers();

  let filtered = filterData(allData, curFilter);

  if (z >= 15) {
    renderMarkers(filtered.filter(t => b.contains([t.lat, t.lng])).slice(0, 120));
  } else if (z >= 13) {
    renderDots(filtered.filter(t => b.contains([t.lat, t.lng])).slice(0, 500), 5);
  } else if (z >= 10) {
    renderDots(filtered, 3.5);
  } else {
    renderDots(filtered, 2);
  }
}

function filterData(data, filter) {
  if (filter === 'all') return data;
  return data.filter(t => {
    if (filter === '24h') return t.is24h;
    if (filter === 'disabled') return t.disabled;
    if (filter === 'baby') return t.baby;
    if (filter === 'cctv') return t.cctv;
    if (filter === 'bell') return t.bell;
    return true;
  });
}

function clearMapMarkers() {
  mrkLayer.forEach(m => { try { map.removeLayer(m); } catch(e){} });
  mrkLayer = [];
  if (dotLayer) { try { map.removeLayer(dotLayer); } catch(e){} dotLayer = null; }
}

function mColor(t) {
  if (t.rating >= 4) return '#1a6b3c';
  if (t.rating >= 3) return '#e67700';
  if (t.rating > 0)  return '#e03131';
  return '#607d8b';
}

function renderMarkers(data) {
  data.forEach(t => {
    const c = mColor(t);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:30px;height:36px;position:relative;">
        <div style="width:30px;height:30px;background:${c};border:3px solid white;
          border-radius:50% 50% 50% 0;transform:rotate(-45deg);
          box-shadow:0 2px 8px rgba(0,0,0,.28);
          display:flex;align-items:center;justify-content:center;">
          <span style="transform:rotate(45deg);font-size:12px;line-height:1;">🚻</span>
        </div>
      </div>`,
      iconSize: [30, 36], iconAnchor: [15, 36]
    });
    const m = L.marker([t.lat, t.lng], { icon }).addTo(map);
    m.on('click', () => { openDetail(t.id); });
    mrkLayer.push(m);
  });
}

function renderDots(data, size) {
  const renderer = L.canvas({ padding: 0.5 });
  const group = L.layerGroup();
  data.forEach(t => {
    const c = L.circleMarker([t.lat, t.lng], {
      radius: size, fillColor: mColor(t),
      color: 'rgba(255,255,255,.6)',
      weight: size > 4 ? 1.5 : 0.8,
      fillOpacity: 0.8, renderer
    });
    c.on('click', () => map.setView([t.lat, t.lng], 15));
    group.addLayer(c);
  });
  dotLayer = group.addTo(map);
}

// ──────────────────────────────────────────────────────
// 목록 렌더링
// ──────────────────────────────────────────────────────
function renderList(data) {
  dispList = data;
  document.getElementById('cnt').textContent = data.length;
  const el = document.getElementById('listWrap');
  el.innerHTML = '';

  if (!data.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px;font-size:13px;color:var(--T3)">결과가 없어요</div>';
    return;
  }

  data.forEach(t => {
    const card = document.createElement('div');
    card.className = 'tcard' + (t.id === openId ? ' sel' : '');
    card.id = `card-${t.id}`;

    card.onclick = () => {
      openDetail(t.id);
      map.setView([t.lat, t.lng], 17);
      collapsePanel();
    };

    const dt = t.dist >= 1000 ? (t.dist / 1000).toFixed(1) + 'km' : t.dist + 'm';
    card.innerHTML = `
      <div class="tc-r1">
        <div class="tc-name">${t.name}</div>
        <div class="tc-dist">${dt}</div>
      </div>
      <div class="tc-addr">📍 ${t.address}</div>
      <div class="tc-tags">
        ${t.is24h   ? '<span class="pill p24">🌙 24시간</span>' : ''}
        ${t.disabled ? '<span class="pill pdis">♿ 장애인</span>' : ''}
        ${t.baby    ? '<span class="pill pbaby">👶 기저귀</span>' : ''}
        ${t.cctv    ? '<span class="pill pccv">📹 CCTV</span>' : ''}
        ${t.bell    ? '<span class="pill pbell">🔔 비상벨</span>' : ''}
      </div>
      <div class="tc-rat">
        ${t.rating > 0
          ? `<span class="star">★</span><b style="margin-left:2px">${t.rating}</b><span style="margin-left:3px;color:var(--T3)">(${t.reviewCnt}개)</span>`
          : '<span>리뷰 없음</span>'}
      </div>`;
    el.appendChild(card);
  });
}

// ──────────────────────────────────────────────────────
// 패널 제어
// ──────────────────────────────────────────────────────
function togglePanel() {
  const p = document.getElementById('panel');
  if (panelState === 'full') {
    p.className = 'panel'; panelState = 'collapsed';
  } else {
    p.className = 'panel full'; panelState = 'full';
  }
}
function collapsePanel() {
  document.getElementById('panel').className = 'panel';
  panelState = 'collapsed';
}

// ──────────────────────────────────────────────────────
// ▼▼▼ 상세 패널 (핵심 버그 수정) ▼▼▼
// - A 클릭 → B 클릭하면 A 즉시 닫히고 B 열림
// - openId로 현재 열린 화장실 추적
// ──────────────────────────────────────────────────────
function openDetail(id) {
  const t = allData.find(x => x.id === id);
  if (!t) return;

  // 같은 화장실 다시 클릭 → 닫기
  if (openId === id) { closeDetail(); return; }

  // 이전 카드 선택 해제
  if (openId !== null) {
    const prevCard = document.getElementById(`card-${openId}`);
    if (prevCard) prevCard.classList.remove('sel');
  }

  // 새 화장실 설정
  openId = id;
  if (!t.dist) t.dist = Math.round(haversine(uLat, uLng, t.lat, t.lng));

  // 새 카드 선택
  const newCard = document.getElementById(`card-${id}`);
  if (newCard) {
    newCard.classList.add('sel');
    newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── 내용 채우기 ──
  document.getElementById('dName').textContent = t.name;
  document.getElementById('dAddr').textContent = `📍 ${t.address}`;
  document.getElementById('dNum').textContent = t.rating > 0 ? t.rating : '-';
  document.getElementById('dStars').textContent = t.rating > 0
    ? '★'.repeat(Math.round(t.rating)) + '☆'.repeat(5 - Math.round(t.rating))
    : '☆☆☆☆☆';
  document.getElementById('dCnt').textContent = t.reviewCnt > 0
    ? `${t.reviewCnt}개 리뷰` : '아직 리뷰 없음';

  document.getElementById('dTags').innerHTML = `
    ${t.is24h    ? '<span class="pill p24">🌙 24시간</span>' : ''}
    ${t.disabled ? '<span class="pill pdis">♿ 장애인</span>' : ''}
    ${t.baby     ? '<span class="pill pbaby">👶 기저귀</span>' : ''}
    ${t.cctv     ? '<span class="pill pccv">📹 CCTV</span>' : ''}
    ${t.bell     ? '<span class="pill pbell">🔔 비상벨</span>' : ''}
  `;

  const v = t.votes || {};

// ──────────────────────────────────────────────────────
// ▼▼▼ 길찾기 (OSRM 직접 fetch - profile별 정확) ▼▼▼
//
// 핵심: foot / cycling / driving 은 각각 다른 서버 프로파일
// → 시간/거리/경로가 모두 다르게 나옴
// ──────────────────────────────────────────────────────
const ROUTE_COLOR = { walk: '#1a6b3c', bike: '#e67700', car: '#1971c2' };
const MODE_LABEL  = { walk: '🚶 도보', bike: '🚲 자전거', car: '🚗 자동차' };
// OSRM 프로파일 이름 (URL에 직접 들어가는 값)
const OSRM_PROFILE = { walk: 'foot', bike: 'cycling', car: 'driving' };
// fallback용 평균 속도 (m/분)
const FALLBACK_SPEED = { walk: 66.7, bike: 250, car: 500 };

function clearRouteLines() {
  routeLines.forEach(l => { try { map.removeLayer(l); } catch(e){} });
  routeLines = [];
}

function startRoute(t) {
  routeTarget = t;
  closeDetail(); // 상세 패널 닫기

  // 경로 패널 열기
  document.getElementById('routePanel').classList.add('show');
  document.getElementById('rpTitle').textContent = `${MODE_LABEL[curMode]} 경로 계산 중...`;

  // 현재 선택된 모드로 바로 경로 계산
  fetchRoute(t, curMode);
}

function setMode(mode, btn) {
  curMode = mode;
  document.querySelectorAll('.mbt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // 이미 경로 대상이 있으면 즉시 다시 계산
  if (routeTarget) fetchRoute(routeTarget, mode);
}

function closeRoute() {
  document.getElementById('routePanel').classList.remove('show');
  clearRouteLines();
  routeTarget = null;
  if (routeController) { routeController.abort(); routeController = null; }
}

function fetchRoute(t, mode) {
  // 이전 요청이 있으면 취소
  if (routeController) routeController.abort();
  routeController = new AbortController();

  clearRouteLines();

  // UI 로딩 상태
  document.getElementById('rtTime').textContent = '-';
  document.getElementById('rtTimeU').textContent = '분';
  document.getElementById('rtDist').textContent = '-';
  document.getElementById('rtDistU').textContent = 'm';
  document.getElementById('rtSpeed').textContent = '-';
  document.getElementById('stepsWrap').innerHTML =
    '<div style="padding:20px;text-align:center;color:var(--T3);font-size:13px">🗺️ 경로 계산 중...</div>';

  // ── OSRM API 직접 호출 ──
  // profile = foot / cycling / driving (이동수단마다 다른 경로)
  // 좌표 순서: 경도(lng), 위도(lat)
  const profile = OSRM_PROFILE[mode];
  const url =
    `https://router.project-osrm.org/route/v1/${profile}/` +
    `${uLng},${uLat};${t.lng},${t.lat}` +
    `?steps=true&geometries=geojson&overview=full&annotations=false`;

  // 이동수단별 정확한 속도 (m/분) - 사용자 제공 표 기준
  // 도보: 1km=15분 → 66.7m/분, 자전거: 1km=4분 → 250m/분, 자동차: 1km=2분 → 500m/분
  const SPEED_PER_MIN = { walk: 66.7, bike: 250, car: 500 };
  const SPEED_KMH     = { walk: 4,    bike: 15,  car: 30 };

  fetch(url, { signal: routeController.signal })
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(data => {
      if (!data.routes || data.routes.length === 0) {
        throw new Error('경로를 찾을 수 없어요');
      }

      const route = data.routes[0];
      const leg   = route.legs[0];

      // 실제 경로 거리 (OSRM이 계산한 값 - 신뢰)
      const distM = Math.round(route.distance);

      // ★ 시간 계산: OSRM duration 대신 거리 ÷ 이동수단별 속도로 직접 계산
      // 이유: OSRM의 duration은 이동수단 무관하게 비슷하게 나오는 버그가 있음
      const speedPerMin = SPEED_PER_MIN[mode];
      const durMin = Math.max(1, Math.round(distM / speedPerMin));
      const kmh = SPEED_KMH[mode];

      // 시간 표시
      if (durMin >= 60) {
        document.getElementById('rtTime').textContent = `${Math.floor(durMin/60)}:${String(durMin%60).padStart(2,'0')}`;
        document.getElementById('rtTimeU').textContent = 'h:m';
      } else {
        document.getElementById('rtTime').textContent = durMin;
        document.getElementById('rtTimeU').textContent = '분';
      }

      // 거리 표시
      if (distM >= 1000) {
        document.getElementById('rtDist').textContent = (distM / 1000).toFixed(2);
        document.getElementById('rtDistU').textContent = 'km';
      } else {
        document.getElementById('rtDist').textContent = distM;
        document.getElementById('rtDistU').textContent = 'm';
      }

      document.getElementById('rtSpeed').textContent = kmh;
      document.getElementById('rpTitle').textContent =
        `${MODE_LABEL[mode]} · ${durMin}분 · ${distM >= 1000 ? (distM/1000).toFixed(1)+'km' : distM+'m'}`;

      // ── 지도에 경로 그리기 ──
      const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

      // 외곽선 (흰색)
      const outline = L.polyline(coords, {
        color: 'white', weight: 9, opacity: .9, lineCap: 'round', lineJoin: 'round'
      }).addTo(map);

      // 메인 경로선
      const mainLine = L.polyline(coords, {
        color: ROUTE_COLOR[mode], weight: 6, opacity: 1, lineCap: 'round', lineJoin: 'round'
      }).addTo(map);

      routeLines.push(outline, mainLine);

      // 출발 마커
      const startM = L.circleMarker([uLat, uLng], {
        radius: 10, fillColor: '#2196f3', color: 'white', weight: 3, fillOpacity: 1
      }).bindPopup('<b>📍 출발지</b>').addTo(map);

      // 도착 마커
      const endIcon = L.divIcon({
        className: '',
        html: `<div style="background:${ROUTE_COLOR[mode]};color:white;padding:5px 10px;
          border-radius:8px;font-size:12px;font-weight:800;
          box-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap;
          border:2px solid white;">🚻 ${t.name}</div>`,
        iconAnchor: [0, 36]
      });
      const endM = L.marker([t.lat, t.lng], { icon: endIcon }).addTo(map);
      routeLines.push(startM, endM);

      // 지도 범위 맞추기
      map.fitBounds(L.polyline(coords).getBounds(), { padding: [65, 80] });

      // ── 경로 단계 렌더링 ──
      renderSteps(leg.steps || [], t, mode);
    })
    .catch(err => {
      if (err.name === 'AbortError') return; // 취소된 요청 무시

      console.error('OSRM 오류:', err);
      // ── Fallback: 직선 거리 + 정확한 이동수단별 속도 ──
      const d = Math.round(haversine(uLat, uLng, t.lat, t.lng));
      // 표 기준 속도: 도보 66.7m/분, 자전거 250m/분, 자동차 500m/분
      const spdMap = { walk:66.7, bike:250, car:500 };
      const kmhMap = { walk:4,    bike:15,  car:30 };
      const tm = Math.max(1, Math.round(d / spdMap[mode]));

      document.getElementById('rtTime').textContent = tm;
      document.getElementById('rtTimeU').textContent = '분';
      document.getElementById('rtDist').textContent = d >= 1000 ? (d/1000).toFixed(1) : d;
      document.getElementById('rtDistU').textContent = d >= 1000 ? 'km' : 'm';
      document.getElementById('rtSpeed').textContent = kmhMap[mode];
      document.getElementById('rpTitle').textContent = `${MODE_LABEL[mode]} · 약 ${tm}분 (직선)`;

      const line = L.polyline([[uLat, uLng], [t.lat, t.lng]], {
        color: ROUTE_COLOR[mode], weight: 5, opacity: .7, dashArray: '10,8'
      }).addTo(map);
      routeLines.push(line);
      map.fitBounds([[uLat, uLng], [t.lat, t.lng]], { padding: [65, 80] });

      document.getElementById('stepsWrap').innerHTML = `
        <div class="step">
          <div class="step-ico" style="background:#fff3cd;font-size:18px;">📡</div>
          <div>
            <div class="step-txt">경로 서버에 연결하지 못했어요</div>
            <div class="step-sub">
              <span>직선 거리 ${d >= 1000 ? (d/1000).toFixed(1)+'km' : d+'m'}</span>
              <span>예상 ${tm}분</span>
              <span>${MODE_LABEL[mode]}</span>
            </div>
          </div>
        </div>`;
    });
}

// ── 경로 단계 렌더링 ──
function renderSteps(steps, t, mode) {
  if (!steps.length) {
    document.getElementById('stepsWrap').innerHTML =
      '<div style="padding:12px;font-size:12px;color:var(--T3)">경로 안내 데이터가 없어요</div>';
    return;
  }

  // OSRM maneuver → 아이콘 매핑
  function getIcon(type, modifier) {
    const m = modifier || '';
    const icons = {
      'depart':           '🚩',
      'arrive':           '🚻',
      'straight':         '⬆️',
      'continue':         '⬆️',
      'new name':         '⬆️',
      'end of road':      m.includes('right') ? '➡️' : '⬅️',
      'turn':             m === 'right'         ? '➡️'
                        : m === 'left'          ? '⬅️'
                        : m === 'slight right'  ? '↗️'
                        : m === 'slight left'   ? '↖️'
                        : m === 'sharp right'   ? '↘️'
                        : m === 'sharp left'    ? '↙️'
                        : m === 'uturn'         ? '↩️' : '⬆️',
      'fork':             m.includes('right') ? '↗️' : '↖️',
      'merge':            m.includes('right') ? '↗️' : '↖️',
      'on ramp':          '↗️',
      'off ramp':         '↘️',
      'roundabout':       '🔄',
      'rotary':           '🔄',
      'exit roundabout':  '↪️',
      'exit rotary':      '↪️',
      'notification':     'ℹ️',
    };
    return icons[type] || '⬆️';
  }

  let cumDist = 0;
  const html = steps.map((s, i) => {
    const isFirst = i === 0;
    const isLast  = i === steps.length - 1;
    const mn      = s.maneuver || {};
    const type    = mn.type || 'straight';
    const mod     = mn.modifier || '';
    const ico     = getIcon(type, mod);

    const stepD   = Math.round(s.distance);
    // step 시간도 이동수단별 속도로 직접 계산 (OSRM duration 버그 보정)
    const speedSec = { walk:66.7/60, bike:250/60, car:500/60 }[mode]; // m/초
    const stepT    = Math.max(1, Math.round(stepD / speedSec));
    cumDist += stepD;

    const dTxt    = stepD >= 1000 ? (stepD/1000).toFixed(1)+'km' : stepD+'m';
    const tTxt    = stepT >= 60
      ? `${Math.floor(stepT/60)}분 ${stepT % 60}초`
      : `${stepT}초`;
    const cumTxt  = cumDist >= 1000 ? (cumDist/1000).toFixed(1)+'km' : cumDist+'m';

    const road    = s.name || '';
    const ref     = s.ref  || '';

    // 도보 횡단보도 감지 (짧고 이름 없는 구간)
    const isCross = mode === 'walk' && !road && stepD < 30 && !isFirst && !isLast;

    // 단계 제목
    let stepTitle = '';
    if (isFirst) {
      stepTitle = '출발';
    } else if (isLast) {
      stepTitle = `<b>🚻 ${t.name}</b> 도착`;
    } else if (isCross) {
      stepTitle = '횡단보도 건너기';
    } else if (road) {
      stepTitle = `<b>${road}</b>`;
      if (ref) stepTitle += ` <span class="badge badge-road">${ref}</span>`;
    } else {
      // turn 설명을 한국어로
      const turnMap = {
        'turn right':'우회전','turn left':'좌회전',
        'slight right':'우측으로','slight left':'좌측으로',
        'sharp right':'급우회전','sharp left':'급좌회전',
        'uturn':'유턴','straight':'직진','continue':'계속 직진'
      };
      const key = mod ? `${type === 'turn' ? '' : type+' '}${mod}`.trim() : type;
      stepTitle = turnMap[key] || turnMap[mod] || '계속 진행';
    }

    // 아이콘 박스 색상
    const bgC = isFirst ? '#dbeafe' : isLast ? '#dcfce7' : '#f1f3f5';
    const txtC = isFirst ? '#1d4ed8' : isLast ? '#16a34a' : '#495057';

    return `
      <div class="step">
        <div class="step-ico" style="background:${bgC};color:${txtC}">${ico}</div>
        <div style="flex:1">
          <div class="step-txt">${stepTitle}</div>
          <div class="step-sub">
            <span>${dTxt}</span>
            <span>${tTxt}</span>
            ${!isFirst ? `<span style="color:var(--T3)">누적 ${cumTxt}</span>` : ''}
            ${isCross ? '<span class="badge badge-cross">🚦 횡단보도</span>' : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('stepsWrap').innerHTML = html;
}

async function submitRev() {
  if (!currentUser) { kkLogin(); return; }
  const t = allData.find(x => x.id === openId);
  if (!t) return;
  if (!selStars) { showToast('⭐ 별점을 선택해주세요!'); return; }
  const txt = document.getElementById('revTa').value.trim();
  if (!txt)   { showToast('✏️ 내용을 입력해주세요!'); return; }

  const rev = {
    stars: selStars, text: txt,
    author: currentUser.name, time: new Date().toISOString()
  };
  t.reviews.unshift(rev);
  const nr = +(t.reviews.reduce((s, r) => s + r.stars, 0) / t.reviews.length).toFixed(1);
  t.rating = nr;
  t.reviewCnt = t.reviews.length;

  if (db) {
    try {
      await db.collection('toilets').doc(String(t.id)).set({
        rating: nr, reviewCount: t.reviews.length,
        reviews: t.reviews.slice(0, 20), votes: t.votes
      }, { merge: true });
    } catch(e) {}
  }
  showToast('✅ 리뷰 등록됐어요!');
  // openDetail 재진입 버그 방지: openId 초기화 후 다시 열기
  openId = null;
  openDetail(t.id);
}

function doVote(el, type) {
  if (el.classList.contains('voted')) return;
  el.classList.add('voted');
  const t = allData.find(x => x.id === openId);
  if (t) {
    t.votes = t.votes || {};
    t.votes[type] = (t.votes[type] || 0) + 1;
    if (db) db.collection('toilets').doc(String(t.id))
      .set({ votes: t.votes }, { merge: true }).catch(() => {});
  }
  showToast('✅ 투표 완료!');
}

// ──────────────────────────────────────────────────────
// 유틸리티
// ──────────────────────────────────────────────────────
function haversine(la1, ln1, la2, ln2) {
  const R = 6371000;
  const dLa = (la2 - la1) * Math.PI / 180;
  const dLn = (ln2 - ln1) * Math.PI / 180;
  const a = Math.sin(dLa/2)**2
    + Math.cos(la1*Math.PI/180) * Math.cos(la2*Math.PI/180) * Math.sin(dLn/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('ko-KR'); } catch { return ''; }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ──────────────────────────────────────────────────────
// 시작
// ──────────────────────────────────────────────────────
window.onload = initMap;
</script>
