<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화장실 지도 — 전국 화장실 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#f7f6f2; --surface:#fff; --surface2:#f0efe9; --border:#e2e0d8;
  --accent:#2d6a4f; --accent-light:#40916c; --accent-pale:#d8f3dc;
  --urgent:#e63946; --text:#1a1a2e; --text-muted:#888880;
  --shadow:0 4px 24px rgba(0,0,0,0.08); --shadow-lg:0 8px 40px rgba(0,0,0,0.14);
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;background:var(--surface);border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--accent);}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-sub{font-size:10px;font-weight:400;color:var(--text-muted);display:block;margin-top:-2px;}
.header-center{flex:1;max-width:400px;margin:0 16px;}
.search-bar{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:100px;padding:0 14px;gap:8px;transition:border-color 0.2s;}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar input{flex:1;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);padding:8px 0;outline:none;}
.search-bar input::placeholder{color:var(--text-muted);}
.header-right{display:flex;gap:7px;align-items:center;}
.btn{border:none;padding:7px 14px;border-radius:100px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all 0.15s;white-space:nowrap;}
.btn-locate{background:var(--accent-pale);color:var(--accent);}
.btn-locate:hover{background:#b7e4c7;}
.btn-urgent{background:var(--urgent);color:white;box-shadow:0 3px 12px rgba(230,57,70,0.35);animation:pulse-btn 2s infinite;}
@keyframes pulse-btn{0%,100%{box-shadow:0 3px 12px rgba(230,57,70,0.35)}50%{box-shadow:0 3px 20px rgba(230,57,70,0.6)}}
.btn-kakao{background:#FEE500;color:#1a1a1a;}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 58px);position:relative;}

/* SIDEBAR */
.sidebar{width:330px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:14px 14px 10px;border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.filter-chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:100px;padding:4px 11px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-chip.active{background:var(--accent-pale);border-color:var(--accent);color:var(--accent);}
.sort-row{display:flex;align-items:center;justify-content:space-between;}
.result-count{font-size:12px;color:var(--text-muted);}
.result-count strong{color:var(--text);font-weight:700;}
.sort-select{border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface2);cursor:pointer;outline:none;}
.toilet-list{flex:1;overflow-y:auto;padding:8px;}
.toilet-list::-webkit-scrollbar{width:3px;}
.toilet-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* DATA BADGE */
.data-badge{padding:9px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:5px;background:var(--surface2);flex-shrink:0;font-weight:500;}
.data-badge strong{color:var(--accent);font-weight:700;}

/* CARDS */
.toilet-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:7px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.toilet-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background 0.2s;}
.toilet-card:hover,.toilet-card.selected{border-color:var(--accent);box-shadow:var(--shadow);}
.toilet-card:hover::before,.toilet-card.selected::before{background:var(--accent);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.card-name{font-size:13px;font-weight:700;line-height:1.3;padding-right:4px;}
.card-dist{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-pale);padding:2px 8px;border-radius:100px;white-space:nowrap;flex-shrink:0;}
.card-addr{font-size:11px;color:var(--text-muted);margin-bottom:6px;line-height:1.4;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;}
.tag-open{background:#d8f3dc;color:#2d6a4f;}
.tag-closed{background:#fde8ea;color:#e63946;}
.tag-24h{background:#e8f4fd;color:#1565c0;}
.tag-dis{background:#f3e8fd;color:#6a1b9a;}
.tag-baby{background:#fff8e1;color:#e65100;}
.tag-cctv{background:#e8eaf6;color:#283593;}
.tag-bell{background:#fce4ec;color:#880e4f;}
.card-rating{display:flex;align-items:center;gap:5px;}
.stars{color:#ffd93d;font-size:11px;}

/* MAP */
#map{flex:1;height:100%;z-index:1;}

/* ROUTING PANEL */
.routing-panel{position:absolute;top:14px;left:346px;width:270px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:900;display:none;overflow:hidden;}
.routing-panel.show{display:block;}
.routing-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--accent-pale);}
.routing-head-title{font-size:13px;font-weight:700;color:var(--accent);}
.routing-close{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text-muted);padding:0 4px;}
.mode-btns{display:flex;gap:5px;padding:10px 12px;border-bottom:1px solid var(--border);}
.mode-btn{flex:1;padding:7px 0;border:1.5px solid var(--border);border-radius:9px;background:var(--surface2);font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all 0.15s;color:var(--text-muted);}
.mode-btn span{font-size:16px;}
.mode-btn.active{border-color:var(--accent);background:var(--accent-pale);color:var(--accent);}
.route-info{padding:10px 12px;}
.route-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.route-stat{background:var(--surface2);border-radius:9px;padding:9px 10px;}
.stat-label{font-size:10px;color:var(--text-muted);margin-bottom:1px;}
.stat-value{font-size:18px;font-weight:900;color:var(--text);line-height:1;}
.stat-unit{font-size:10px;color:var(--text-muted);}
.route-steps{max-height:220px;overflow-y:auto;}
.route-steps::-webkit-scrollbar{width:3px;}
.route-step{display:flex;gap:7px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.route-step:last-child{border-bottom:none;}
.step-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.step-dist{font-size:10px;color:var(--text-muted);margin-top:1px;}

/* DETAIL PANEL */
.detail-panel{position:absolute;bottom:16px;right:16px;width:300px;background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:900;overflow:hidden;transform:translateY(20px);opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);max-height:calc(100vh - 90px);overflow-y:auto;}
.detail-panel.visible{transform:translateY(0);opacity:1;pointer-events:all;}
.detail-panel::-webkit-scrollbar{width:3px;}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.d-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--accent-pale) 0%,#fff 100%);position:sticky;top:0;z-index:1;}
.d-close{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(255,255,255,0.8);cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;}
.d-name{font-size:15px;font-weight:800;margin-bottom:3px;padding-right:26px;line-height:1.3;}
.d-addr{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
.d-tags{display:flex;gap:4px;flex-wrap:wrap;}
.d-body{padding:12px 14px;}
.section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 7px;}
.section-title:first-child{margin-top:0;}
.rating-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.big-rating{font-size:32px;font-weight:900;line-height:1;}
.big-stars{font-size:14px;color:#ffd93d;margin-bottom:2px;}
.review-count{font-size:11px;color:var(--text-muted);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
.info-item{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.info-label{font-size:9px;color:var(--text-muted);margin-bottom:2px;}
.info-value{font-size:11px;font-weight:600;line-height:1.3;}
.vote-box{background:var(--surface2);border-radius:9px;padding:9px;margin-bottom:10px;}
.vote-title{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.live-dot{width:5px;height:5px;background:var(--urgent);border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.vote-items{display:flex;gap:5px;flex-wrap:wrap;}
.vote-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:3px;font-weight:500;}
.vote-item:hover{border-color:var(--accent);color:var(--accent);}
.vote-item.voted{background:var(--accent-pale);border-color:var(--accent);color:var(--accent);}
.reviews-list{margin-bottom:10px;}
.review-item{border-bottom:1px solid var(--border);padding:7px 0;}
.review-item:last-child{border-bottom:none;}
.r-top{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.r-stars{font-size:10px;color:#ffd93d;}
.r-author{font-size:10px;font-weight:700;}
.r-time{font-size:10px;color:var(--text-muted);margin-left:auto;}
.r-text{font-size:11px;line-height:1.5;}
.review-form{background:var(--surface2);border-radius:9px;padding:10px;margin-bottom:10px;}
.rf-title{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:6px;}
.star-picker{display:flex;gap:4px;margin-bottom:6px;}
.star-picker span{font-size:19px;cursor:pointer;color:#ddd;transition:color 0.15s;line-height:1;}
.star-picker span.on{color:#ffd93d;}
.r-textarea{width:100%;height:52px;border:1.5px solid var(--border);border-radius:7px;padding:6px;font-family:'Noto Sans KR',sans-serif;font-size:11px;resize:none;outline:none;background:var(--surface);}
.r-textarea:focus{border-color:var(--accent);}
.btn-submit{width:100%;background:var(--accent);color:white;border:none;padding:8px;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-nav{width:100%;background:var(--accent);color:white;border:none;padding:11px;border-radius:11px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s;}
.btn-nav:hover{background:var(--accent-light);transform:scale(1.02);}

/* STATS BAR */
.stats-bar{position:absolute;top:12px;left:346px;display:flex;gap:7px;z-index:800;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:5px 11px;font-size:11px;font-weight:500;box-shadow:var(--shadow);display:flex;align-items:center;gap:4px;}

/* URGENT */
.urgent-overlay{display:none;position:fixed;inset:0;background:rgba(230,57,70,0.95);z-index:9000;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.urgent-overlay.show{display:flex;}
.urgent-emoji{font-size:64px;animation:shake 0.4s infinite;}
@keyframes shake{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.urgent-title{font-size:22px;font-weight:900;color:white;text-align:center;}
.urgent-name{font-size:18px;font-weight:700;color:rgba(255,255,255,0.9);text-align:center;}
.urgent-dist{font-size:14px;color:rgba(255,255,255,0.8);text-align:center;}
.urgent-close{background:white;color:var(--urgent);border:none;padding:12px 32px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:white;padding:10px 20px;border-radius:100px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:all 0.3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading{position:fixed;inset:0;background:rgba(247,246,242,0.92);z-index:8000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spinner{width:38px;height:38px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;font-weight:600;color:var(--accent);}

/* leaflet routing hide default */
.leaflet-routing-container{display:none !important;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🚻</div>
    <div>화장실 지도<span class="logo-sub">전국 공중화장실 찾기</span></div>
  </div>
  <div class="header-center">
    <div class="search-bar">
      <span style="color:var(--text-muted);font-size:14px">🔍</span>
      <input type="text" placeholder="화장실명, 주소로 검색" id="searchInput" oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-locate" onclick="locateMe()">📍 내 위치</button>
    <button class="btn btn-kakao" id="loginBtn" onclick="kakaoLogin()">카카오 로그인</button>
    <button class="btn btn-urgent" onclick="showUrgentMode()">🚨 급함 모드</button>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="filter-row">
        <div class="filter-chip active" onclick="applyFilter('all',this)">전체</div>
        <div class="filter-chip" onclick="applyFilter('24h',this)">🌙 24시간</div>
        <div class="filter-chip" onclick="applyFilter('disabled',this)">♿ 장애인</div>
        <div class="filter-chip" onclick="applyFilter('baby',this)">👶 기저귀</div>
        <div class="filter-chip" onclick="applyFilter('cctv',this)">📹 CCTV</div>
      </div>
      <div class="sort-row">
        <span class="result-count">주변 <strong id="countEl">0</strong>개 화장실</span>
        <select class="sort-select" onchange="sortList(this.value)">
          <option value="dist">거리순</option>
          <option value="rating">별점순</option>
          <option value="name">이름순</option>
        </select>
      </div>
    </div>
    <div class="toilet-list" id="toiletList"></div>
    <div class="data-badge">
      📅 데이터 마지막 수정일: <strong>2026-02-10</strong>&nbsp;·&nbsp;행정안전부 공중화장실 정보
    </div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-chip">🗺️ 전국 <strong id="nearCnt">0</strong>개</div>
    <div class="stat-chip">♿ 장애인 <strong id="disCnt">0</strong>개</div>
    <div class="stat-chip">🌙 24시간 <strong id="allCnt">0</strong>개</div>
  </div>

  <!-- ROUTING PANEL -->
  <div class="routing-panel" id="routingPanel">
    <div class="routing-head">
      <span class="routing-head-title" id="routingTitle">🗺️ 길찾기</span>
      <button class="routing-close" onclick="closeRouting()">✕</button>
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" id="modeWalk" onclick="setMode('walk',this)"><span>🚶</span>도보</button>
      <button class="mode-btn" id="modeBike" onclick="setMode('bike',this)"><span>🚲</span>자전거</button>
      <button class="mode-btn" id="modeCar" onclick="setMode('car',this)"><span>🚗</span>자동차</button>
    </div>
    <div class="route-info">
      <div class="route-stats">
        <div class="route-stat">
          <div class="stat-label">예상 시간</div>
          <div class="stat-value" id="routeTime">-</div>
          <div class="stat-unit">분</div>
        </div>
        <div class="route-stat">
          <div class="stat-label">거리</div>
          <div class="stat-value" id="routeDist">-</div>
          <div class="stat-unit" id="routeDistUnit">m</div>
        </div>
      </div>
      <div class="route-steps" id="routeSteps">
        <div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px">이동수단을 선택하면 경로가 표시돼요</div>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="d-head">
      <button class="d-close" onclick="closeDetail()">✕</button>
      <div class="d-name" id="dName"></div>
      <div class="d-addr" id="dAddr"></div>
      <div class="d-tags" id="dTags"></div>
    </div>
    <div class="d-body">
      <div class="section-title">청결도 / 리뷰</div>
      <div class="rating-row">
        <div class="big-rating" id="dRating">-</div>
        <div>
          <div class="big-stars" id="dStars"></div>
          <div class="review-count" id="dReviewCnt">아직 리뷰 없음</div>
        </div>
      </div>
      <div class="section-title">실시간 현황</div>
      <div class="vote-box">
        <div class="vote-title"><div class="live-dot"></div>최근 1시간</div>
        <div class="vote-items" id="voteItems"></div>
      </div>
      <div class="section-title">상세 정보</div>
      <div class="info-grid" id="infoGrid"></div>
      <div class="section-title">리뷰</div>
      <div class="reviews-list" id="reviewsList"></div>
      <div class="review-form">
        <div class="rf-title">✏️ 리뷰 남기기</div>
        <div class="star-picker" id="starPicker">
          <span data-n="1" onclick="pickStar(1)">★</span>
          <span data-n="2" onclick="pickStar(2)">★</span>
          <span data-n="3" onclick="pickStar(3)">★</span>
          <span data-n="4" onclick="pickStar(4)">★</span>
          <span data-n="5" onclick="pickStar(5)">★</span>
        </div>
        <textarea class="r-textarea" id="reviewText" placeholder="화장실 상태를 알려주세요..."></textarea>
        <button class="btn-submit" onclick="submitReview()" id="reviewBtn">카카오 로그인 후 작성</button>
      </div>
      <button class="btn-nav" id="btnNav">🗺️ 길찾기</button>
    </div>
  </div>
</div>

<!-- URGENT -->
<div class="urgent-overlay" id="urgentOverlay">
  <div class="urgent-emoji">🚨</div>
  <div class="urgent-title">가장 가까운 화장실!</div>
  <div class="urgent-name" id="urgentName"></div>
  <div class="urgent-dist" id="urgentDist"></div>
  <button class="urgent-close" onclick="document.getElementById('urgentOverlay').classList.remove('show')">확인 😮‍💨</button>

<!-- 전국 화장실 데이터 -->
<script src="toilets_data.js"></script>

<script>
// ===== 설정 =====
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyC0wW0pdpavag53mMFYBAap71XnumdiMnk",
  authDomain:"hwajangsil-jido.firebaseapp.com",
  projectId:"hwajangsil-jido",
  storageBucket:"hwajangsil-jido.firebasestorage.app",
  messagingSenderId:"359899240185",
  appId:"1:359899240185:web:029c23d584d1bbdc19b428"
};
const KAKAO_KEY = 'a08fe69a1355d47b0e5e2a4b337cfd5b';

// Firebase
let db;
try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.firestore(); } catch(e) {}

// 카카오 SDK
(()=>{
  const s=document.createElement('script');
  s.src='https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
  s.crossOrigin='anonymous';
  s.onload=()=>{if(window.Kakao&&!Kakao.isInitialized())Kakao.init(KAKAO_KEY);};
  document.head.appendChild(s);
})();

// ===== 상태 =====
let map, routingCtrl=null, userMarker=null;
let uLat=37.5550, uLng=126.9707;
let currentUser=null, selectedT=null, pickedStars=0, currentMode='walk';
let nearby=[], allToilets=[], displayList=[];

// ===== 카카오 로그인 =====
function kakaoLogin(){
  if(!window.Kakao||!Kakao.isInitialized()){showToast('⏳ 잠시 후 다시 눌러주세요');return;}
  if(currentUser){kakaoLogout();return;}
  try{
    Kakao.Auth.login({
      success:()=>{
        Kakao.API.request({url:'/v2/user/me',
          success:(r)=>{
            currentUser={id:r.id,name:r.kakao_account?.profile?.nickname||'사용자',photo:r.kakao_account?.profile?.profile_image_url||''};
            updateLoginUI();showToast(`✅ ${currentUser.name}님 환영해요!`);
            document.getElementById('reviewBtn').textContent='리뷰 등록';
          },
          fail:()=>showToast('❌ 사용자 정보 오류')
        });
      },
      fail:(e)=>{console.error(e);showToast('❌ 로그인 실패 — 팝업 차단 해제 후 시도');}
    });
  }catch(e){showToast('❌'+e.message);}
}
function kakaoLogout(){
  if(window.Kakao&&Kakao.Auth.getAccessToken()){
    Kakao.Auth.logout(()=>{currentUser=null;updateLoginUI();showToast('로그아웃 됐어요');});
  }else{currentUser=null;updateLoginUI();}
}
function updateLoginUI(){
  const btn=document.getElementById('loginBtn');
  btn.textContent=currentUser?`${currentUser.name} 로그아웃`:'카카오 로그인';
  document.getElementById('reviewBtn').textContent=currentUser?'리뷰 등록':'카카오 로그인 후 작성';
}

// ===== 지도 초기화 =====
function initMap(){
  map=L.map('map',{zoomControl:false}).setView([uLat,uLng],15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:19
  }).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);

  // CSV 데이터 로드
  setTimeout(loadData, 100);
}

function loadData(){
  try{
    if(typeof TOILET_DATA==='undefined'||!TOILET_DATA.length) throw new Error('no data');

    allToilets=TOILET_DATA.map(t=>({
      id:t.i, name:t.n, address:t.a, lat:t.la, lng:t.ln,
      hours:t.h, is24h:t.t===1, disabled:t.d===1, baby:t.b===1, cctv:t.c===1, bell:t.e===1,
      rating:0, reviewCnt:0, reviews:[], votes:{paper:0,soap:0,smell:0,queue:0}
    }));

    document.getElementById('loading').style.display='none';

    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        uLat=pos.coords.latitude; uLng=pos.coords.longitude;
        map.setView([uLat,uLng],16);
        placeUserMarker();
        updateNearby();
      },()=>{placeUserMarker();updateNearby();});
    }else{placeUserMarker();updateNearby();}
  }catch(e){
    document.getElementById('loading').style.display='none';
    showToast('❌ 데이터 로딩 실패: toilets_data.js 파일 확인');
  }
}

function placeUserMarker(){
  if(userMarker) map.removeLayer(userMarker);
  userMarker=L.circleMarker([uLat,uLng],{
    radius:11,fillColor:'#2196f3',color:'white',weight:3,fillOpacity:0.95
  }).addTo(map).bindPopup('<b>📍 내 위치</b>');
}

function updateNearby(){
  // 전체 데이터에 거리 계산
  nearby=allToilets.map(t=>({
    ...t, dist:Math.round(calcDist(uLat,uLng,t.lat,t.lng))
  })).sort((a,b)=>a.dist-b.dist);

  if(db){
    loadFirebaseReviews().finally(()=>{renderByZoom();updateSideList();updateStats();});
  }else{renderByZoom();updateSideList();updateStats();}

  // 줌 변경시 마커 업데이트
  map.off('zoomend');
  map.on('zoomend', ()=>{renderByZoom();updateSideList();});
  map.off('moveend');
  map.on('moveend', ()=>{renderByZoom();updateSideList();});
}

function renderByZoom(){
  const zoom = map.getZoom();
  const bounds = map.getBounds();

  if(zoom >= 15){
    // 확대: 화면 내 화장실 마커로 표시
    const visible = nearby.filter(t => bounds.contains([t.lat, t.lng])).slice(0, 100);
    renderMarkers(visible);
    return visible;
  } else if(zoom >= 12){
    // 중간: 화면 내 화장실 작은 점으로
    const visible = nearby.filter(t => bounds.contains([t.lat, t.lng])).slice(0, 200);
    renderDots(visible, 6);
    return visible;
  } else if(zoom >= 9){
    // 축소: 전국 작은 점
    renderDots(allToilets, 4);
    return allToilets;
  } else {
    // 많이 축소: 전국 아주 작은 점
    renderDots(allToilets, 2);
    return allToilets;
  }
}

function updateSideList(){
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  // 사이드바는 항상 내 위치 기준 가까운 순
  const list = nearby.filter(t => t.dist <= 5000).slice(0, 50);
  renderList(list);
}

async function loadFirebaseReviews(){
  try{
    const ids=nearby.slice(0,30).map(t=>String(t.id));
    for(let i=0;i<ids.length;i+=10){
      const batch=ids.slice(i,i+10);
      const snap=await db.collection('toilets').where(firebase.firestore.FieldPath.documentId(),'in',batch).get();
      snap.forEach(doc=>{
        const t=nearby.find(x=>String(x.id)===doc.id);
        if(t){const d=doc.data();t.rating=d.rating||0;t.reviewCnt=d.reviewCount||0;t.reviews=d.reviews||[];t.votes=d.votes||{paper:0,soap:0,smell:0,queue:0};}
      });
    }
  }catch(e){console.warn('Firebase:',e);}
}

function updateStats(){
  const n=allToilets.length;
  const d=allToilets.filter(t=>t.disabled).length;
  const a=allToilets.filter(t=>t.is24h).length;
  document.getElementById('nearCnt').textContent=n.toLocaleString();
  document.getElementById('disCnt').textContent=d.toLocaleString();
  document.getElementById('allCnt').textContent=a.toLocaleString();
  document.getElementById('statsBar').style.display='flex';
}

// ===== 마커 =====
let markerLayer=[], dotLayer=null;

function renderMarkers(data){
  // 점 레이어 제거
  if(dotLayer){map.removeLayer(dotLayer);dotLayer=null;}
  markerLayer.forEach(m=>map.removeLayer(m));
  markerLayer=[];
  (data||nearby).forEach(t=>{
    const color=t.rating>=4?'#2d6a4f':t.rating>=3?'#f57c00':t.rating>0?'#e63946':'#607d8b';
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:28px;height:28px;background:${color};border:2.5px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:12px">🚻</span></div>`,
      iconSize:[28,28],iconAnchor:[14,28]
    });
    const m=L.marker([t.lat,t.lng],{icon}).addTo(map);
    m.on('click',()=>{
      const found=nearby.find(x=>x.id===t.id)||t;
      openDetail(found.id);
      highlightCard(found.id);
    });
    markerLayer.push(m);
  });
}

function renderDots(data, size){
  // 기존 마커/점 제거
  markerLayer.forEach(m=>map.removeLayer(m));
  markerLayer=[];
  if(dotLayer){map.removeLayer(dotLayer);dotLayer=null;}

  // Canvas로 빠르게 점 그리기
  const canvasRenderer = L.canvas({padding:0.5});
  const layerGroup = L.layerGroup();

  data.forEach(t=>{
    const color = t.rating>=4?'#2d6a4f':t.rating>=3?'#f57c00':t.rating>0?'#e63946':'#607d8b';
    const circle = L.circleMarker([t.lat,t.lng],{
      radius: size,
      fillColor: color,
      color: 'white',
      weight: size > 4 ? 1.5 : 0.5,
      fillOpacity: 0.85,
      renderer: canvasRenderer
    });
    circle.on('click',()=>{
      map.setView([t.lat,t.lng],16);
    });
    layerGroup.addLayer(circle);
  });

  dotLayer = layerGroup;
  dotLayer.addTo(map);
}

// ===== 목록 =====
function renderList(data){
  displayList=data;
  document.getElementById('countEl').textContent=data.length;
  const list=document.getElementById('toiletList');
  list.innerHTML='';
  data.forEach(t=>{
    const d=document.createElement('div');
    d.className='toilet-card';d.id=`card-${t.id}`;
    d.onclick=()=>{openDetail(t.id);map.setView([t.lat,t.lng],17);};
    const distTxt=t.dist>=1000?(t.dist/1000).toFixed(1)+'km':t.dist+'m';
    d.innerHTML=`
      <div class="card-top"><div class="card-name">${t.name}</div><div class="card-dist">${distTxt}</div></div>
      <div class="card-addr">📍 ${t.address}</div>
      <div class="card-tags">
        ${t.is24h?'<span class="tag tag-24h">🌙 24시간</span>':''}
        ${t.disabled?'<span class="tag tag-dis">♿ 장애인</span>':''}
        ${t.baby?'<span class="tag tag-baby">👶 기저귀</span>':''}
        ${t.cctv?'<span class="tag tag-cctv">📹 CCTV</span>':''}
        ${t.bell?'<span class="tag tag-bell">🔔 비상벨</span>':''}
      </div>
      <div class="card-rating">${t.rating>0?`<span class="stars">${stars(t.rating)}</span><span style="font-size:12px;font-weight:700;margin-left:2px">${t.rating}</span><span style="font-size:10px;color:var(--text-muted);margin-left:3px">(${t.reviewCnt})</span>`:'<span style="font-size:11px;color:var(--text-muted)">리뷰 없음</span>'}</div>
    `;
    list.appendChild(d);
  });
}

function highlightCard(id){
  document.querySelectorAll('.toilet-card').forEach(c=>c.classList.remove('selected'));
  const c=document.getElementById(`card-${id}`);
  if(c){c.classList.add('selected');c.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

// ===== 상세 패널 =====
function openDetail(id){
  const t=nearby.find(x=>x.id===id);
  if(!t) return;
  selectedT=t;
  highlightCard(id);

  document.getElementById('dName').textContent=t.name;
  document.getElementById('dAddr').textContent=`📍 ${t.address}`;
  document.getElementById('dRating').textContent=t.rating>0?t.rating:'-';
  document.getElementById('dStars').textContent=t.rating>0?stars(t.rating):'';
  document.getElementById('dReviewCnt').textContent=t.reviewCnt>0?`${t.reviewCnt}개 리뷰`:'아직 리뷰 없음';

  document.getElementById('dTags').innerHTML=`
    ${t.is24h?'<span class="tag tag-24h">🌙 24시간</span>':''}
    ${t.disabled?'<span class="tag tag-dis">♿ 장애인</span>':''}
    ${t.baby?'<span class="tag tag-baby">👶 기저귀</span>':''}
    ${t.cctv?'<span class="tag tag-cctv">📹 CCTV</span>':''}
    ${t.bell?'<span class="tag tag-bell">🔔 비상벨</span>':''}
  `;

  const v=t.votes||{paper:0,soap:0,smell:0,queue:0};
  document.getElementById('voteItems').innerHTML=`
    <div class="vote-item" onclick="vote(this,'paper')">🧻 휴지있음 <b>${v.paper}</b></div>
    <div class="vote-item" onclick="vote(this,'soap')">🧼 비누있음 <b>${v.soap}</b></div>
    <div class="vote-item" onclick="vote(this,'smell')">😷 냄새남 <b>${v.smell}</b></div>
    <div class="vote-item" onclick="vote(this,'queue')">🚶 줄있음 <b>${v.queue}</b></div>
  `;

  const distTxt=t.dist>=1000?(t.dist/1000).toFixed(1)+'km':t.dist+'m';
  document.getElementById('infoGrid').innerHTML=`
    <div class="info-item"><div class="info-label">운영시간</div><div class="info-value">${t.hours||'정보없음'}</div></div>
    <div class="info-item"><div class="info-label">거리</div><div class="info-value">${distTxt}</div></div>
    <div class="info-item"><div class="info-label">장애인 시설</div><div class="info-value">${t.disabled?'✅ 있음':'❌ 없음'}</div></div>
    <div class="info-item"><div class="info-label">기저귀교환대</div><div class="info-value">${t.baby?'✅ 있음':'❌ 없음'}</div></div>
    <div class="info-item"><div class="info-label">CCTV</div><div class="info-value">${t.cctv?'✅ 있음':'❌ 없음'}</div></div>
    <div class="info-item"><div class="info-label">비상벨</div><div class="info-value">${t.bell?'✅ 있음':'❌ 없음'}</div></div>
  `;

  const revs=t.reviews||[];
  document.getElementById('reviewsList').innerHTML=revs.length>0
    ?revs.slice(0,5).map(r=>`
      <div class="review-item">
        <div class="r-top"><span class="r-stars">${stars(r.stars)}</span><span class="r-author">${r.author||'익명'}</span><span class="r-time">${fmtDate(r.time)}</span></div>
        <div class="r-text">${r.text}</div>
      </div>`).join('')
    :'<div style="font-size:11px;color:var(--text-muted);padding:4px 0">첫 리뷰를 남겨보세요!</div>';

  pickedStars=0;
  document.querySelectorAll('#starPicker span').forEach(s=>s.classList.remove('on'));
  document.getElementById('reviewText').value='';

  document.getElementById('btnNav').onclick=()=>startRouting(t);
  document.getElementById('detailPanel').classList.add('visible');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('visible');
  selectedT=null;
  document.querySelectorAll('.toilet-card').forEach(c=>c.classList.remove('selected'));
}

// ===== 길찾기 (페이지 내) =====
function startRouting(t){
  if(!t) return;
  selectedT=t;
  closeDetail();
  document.getElementById('routingTitle').textContent=`🗺️ ${t.name}`;
  document.getElementById('routingPanel').classList.add('show');
  document.getElementById('routeSteps').innerHTML='<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:10px">경로 계산 중...</div>';
  doRoute(t, currentMode);
}

function doRoute(t, mode){
  if(routingCtrl){map.removeControl(routingCtrl);routingCtrl=null;}

  const profiles={walk:'foot',bike:'cycling',car:'driving'};
  const speeds={walk:75,bike:220,car:450}; // m/min

  routingCtrl=L.Routing.control({
    waypoints:[L.latLng(uLat,uLng),L.latLng(t.lat,t.lng)],
    router:L.Routing.osrmv1({
      serviceUrl:'https://router.project-osrm.org/route/v1',
      profile:profiles[mode]
    }),
    routeWhileDragging:false,
    showAlternatives:false,
    addWaypoints:false,
    fitSelectedRoutes:true,
    show:false,
    createMarker:(i,wp)=>{
      if(i===0) return L.circleMarker(wp.latLng,{radius:10,fillColor:'#2196f3',color:'white',weight:3,fillOpacity:0.95}).bindPopup('<b>📍 내 위치</b>');
      return L.marker(wp.latLng,{
        icon:L.divIcon({className:'',html:`<div style="background:var(--accent);color:white;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3)">🚻 ${t.name}</div>`,iconAnchor:[0,0]})
      });
    },
    lineOptions:{
      styles:[
        {color:'white',weight:8,opacity:0.8},
        {color:mode==='car'?'#1976d2':mode==='bike'?'#f57c00':'#2d6a4f',weight:5,opacity:0.9}
      ]
    }
  }).addTo(map);

  routingCtrl.on('routesfound',e=>{
    const r=e.routes[0];
    const distM=Math.round(r.summary.totalDistance);
    const timeSec=r.summary.totalTime;
    const timeMin=Math.round(timeSec/60);

    const distDisplay=distM>=1000?(distM/1000).toFixed(1):distM;
    const distUnit=distM>=1000?'km':'m';
    document.getElementById('routeTime').textContent=timeMin;
    document.getElementById('routeDist').textContent=distDisplay;
    document.getElementById('routeDistUnit').textContent=distUnit;

    // 경로 안내
    const iconMap={
      'Straight':'⬆️','SlightRight':'↗️','Right':'➡️','SharpRight':'↘️',
      'Uturn':'↩️','SharpLeft':'↙️','Left':'⬅️','SlightLeft':'↖️',
      'Roundabout':'🔄','DestinationReached':'🚻','WaypointReached':'📍',
      'Head':'⬆️','Enter Roundabout':'🔄','Exit Roundabout':'🔄'
    };

    const steps=r.instructions||[];
    if(steps.length===0){
      document.getElementById('routeSteps').innerHTML='<div style="font-size:11px;color:var(--text-muted);padding:8px">경로 안내를 불러왔어요.</div>';
      return;
    }

    document.getElementById('routeSteps').innerHTML=steps.map(s=>{
      const d=s.distance>=1000?(s.distance/1000).toFixed(1)+'km':Math.round(s.distance)+'m';
      const ico=iconMap[s.type]||'➡️';
      return `<div class="route-step">
        <div class="step-icon">${ico}</div>
        <div>
          <div>${s.text}</div>
          <div class="step-dist">${d}</div>
        </div>
      </div>`;
    }).join('');
  });

  routingCtrl.on('routingerror',()=>{
    // OSRM 실패 시 직선 + 예상시간
    if(routingCtrl){map.removeControl(routingCtrl);routingCtrl=null;}
    const d=Math.round(calcDist(uLat,uLng,t.lat,t.lng));
    const spd=speeds[mode];
    const tm=Math.round(d/spd);
    const dTxt=d>=1000?(d/1000).toFixed(1)+'km':d+'m';

    document.getElementById('routeTime').textContent=tm;
    document.getElementById('routeDist').textContent=d>=1000?(d/1000).toFixed(1):d;
    document.getElementById('routeDistUnit').textContent=d>=1000?'km':'m';

    L.polyline([[uLat,uLng],[t.lat,t.lng]],{color:mode==='car'?'#1976d2':mode==='bike'?'#f57c00':'#2d6a4f',weight:4,opacity:0.75,dashArray:'10,8'}).addTo(map);
    map.fitBounds([[uLat,uLng],[t.lat,t.lng]],{padding:[60,60]});

    document.getElementById('routeSteps').innerHTML=`
      <div style="font-size:11px;color:var(--text-muted);padding:6px;line-height:1.6">
        📡 서버 응답이 느려 직선 경로로 표시했어요.<br>
        거리: <b>${dTxt}</b> / 예상 시간: <b>${tm}분</b>
      </div>`;
  });
}

function setMode(mode, btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(selectedT) doRoute(selectedT, mode);
}

function closeRouting(){
  document.getElementById('routingPanel').classList.remove('show');
  if(routingCtrl){map.removeControl(routingCtrl);routingCtrl=null;}
}

// ===== 급함 모드 =====
function showUrgentMode(){
  const c=nearby[0];
  if(!c){showToast('❌ 주변 화장실 없음');return;}
  document.getElementById('urgentName').textContent=c.name;
  const dTxt=c.dist>=1000?(c.dist/1000).toFixed(1)+'km':c.dist+'m';
  document.getElementById('urgentDist').textContent=`📍 ${dTxt} · 도보 약 ${Math.round(c.dist/75)}분`;
  document.getElementById('urgentOverlay').classList.add('show');
  map.setView([c.lat,c.lng],17);
  setTimeout(()=>openDetail(c.id),300);
}

// ===== 내 위치 =====
function locateMe(){
  showToast('📍 위치 확인 중...');
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      uLat=pos.coords.latitude;uLng=pos.coords.longitude;
      map.setView([uLat,uLng],16);
      placeUserMarker();
      updateNearby();
      showToast('✅ 내 위치를 찾았어요!');
    },()=>showToast('❌ 위치 권한이 필요해요'));
  }
}

// ===== 검색 =====
function handleSearch(val){
  if(!val.trim()){renderList(nearby);return;}
  const q=val.trim();
  const res=allToilets.filter(t=>t.name.includes(q)||t.address.includes(q))
    .map(t=>({...t,dist:Math.round(calcDist(uLat,uLng,t.lat,t.lng))}))
    .sort((a,b)=>a.dist-b.dist).slice(0,40);
  renderList(res);
}

// ===== 필터 =====
function applyFilter(key, el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  let f=nearby;
  if(key==='24h') f=f.filter(t=>t.is24h);
  else if(key==='disabled') f=f.filter(t=>t.disabled);
  else if(key==='baby') f=f.filter(t=>t.baby);
  else if(key==='cctv') f=f.filter(t=>t.cctv);
  renderList(f);
}

// ===== 정렬 =====
function sortList(by){
  const s=[...displayList].sort((a,b)=>{
    if(by==='dist') return a.dist-b.dist;
    if(by==='rating') return b.rating-a.rating;
    if(by==='name') return a.name.localeCompare(b.name,'ko');
    return 0;
  });
  renderList(s);
}

// ===== 리뷰 =====
function pickStar(n){
  pickedStars=n;
  document.querySelectorAll('#starPicker span').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.n)<=n));
}

async function submitReview(){
  if(!currentUser){kakaoLogin();return;}
  if(!selectedT){return;}
  if(!pickedStars){showToast('⭐ 별점을 선택해주세요!');return;}
  const text=document.getElementById('reviewText').value.trim();
  if(!text){showToast('✏️ 내용을 입력해주세요!');return;}

  const rev={stars:pickedStars,text,author:currentUser.name,time:new Date().toISOString()};
  selectedT.reviews.unshift(rev);
  const newRating=+(selectedT.reviews.reduce((s,r)=>s+r.stars,0)/selectedT.reviews.length).toFixed(1);
  selectedT.rating=newRating;selectedT.reviewCnt=selectedT.reviews.length;

  if(db){
    try{
      await db.collection('toilets').doc(String(selectedT.id)).set({
        rating:newRating,reviewCount:selectedT.reviews.length,
        reviews:selectedT.reviews.slice(0,20),votes:selectedT.votes
      },{merge:true});
    }catch(e){console.warn('Firebase:',e);}
  }
  showToast('✅ 리뷰 등록됐어요!');
  openDetail(selectedT.id);
}

function vote(el,type){
  if(el.classList.contains('voted')) return;
  el.classList.add('voted');
  if(selectedT){
    selectedT.votes=selectedT.votes||{paper:0,soap:0,smell:0,queue:0};
    selectedT.votes[type]++;
    if(db) db.collection('toilets').doc(String(selectedT.id)).set({votes:selectedT.votes},{merge:true}).catch(()=>{});
  }
  showToast('✅ 투표 완료!');
}

// ===== 유틸 =====
function calcDist(la1,ln1,la2,ln2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function stars(r){
  const f=Math.floor(r);
  return '★'.repeat(f)+'☆'.repeat(5-f);
}
function fmtDate(iso){
  if(!iso) return '';
  try{return new Date(iso).toLocaleDateString('ko-KR');}catch{return '';}
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.onload=initMap;
</script>
