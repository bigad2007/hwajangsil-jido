<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>화장실 지도 — 전국 화장실 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --accent: #2d6a4f;
  --accent-light: #40916c;
  --accent-pale: #d8f3dc;
  --urgent: #e63946;
  --text: #1a1a2e;
  --text-muted: #888880;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  --radius: 16px;
  --header-h: 60px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; flex-direction: column;
}

/* ======= HEADER ======= */
header {
  display: flex; align-items: center;
  padding: 0 20px; height: var(--header-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  z-index: 1000; flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06); gap: 12px;
}
.logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; color:var(--accent); flex-shrink:0; }
.logo-icon { width:34px; height:34px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.logo-sub { font-size:10px; font-weight:400; color:var(--text-muted); display:block; }
.header-center { flex:1; min-width:0; }
.search-bar { display:flex; align-items:center; background:var(--surface2); border:1.5px solid var(--border); border-radius:100px; padding:0 14px; gap:8px; transition:border-color 0.2s; }
.search-bar:focus-within { border-color:var(--accent); }
.search-bar input { flex:1; border:none; background:transparent; font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--text); padding:9px 0; outline:none; min-width:0; }
.search-bar input::placeholder { color:var(--text-muted); }
.header-right { display:flex; gap:8px; align-items:center; flex-shrink:0; }
.btn-urgent { background:var(--urgent); color:white; border:none; padding:8px 16px; border-radius:100px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; box-shadow:0 3px 12px rgba(230,57,70,0.35); animation:pulse-btn 2s infinite; transition:transform 0.15s; }
@keyframes pulse-btn { 0%,100%{box-shadow:0 3px 12px rgba(230,57,70,0.35);} 50%{box-shadow:0 3px 20px rgba(230,57,70,0.6);} }
.btn-urgent:hover { transform:scale(1.04); }
.btn-locate { background:var(--accent-pale); color:var(--accent); border:none; padding:8px 14px; border-radius:100px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background 0.2s; }
.btn-locate:hover { background:#b7e4c7; }
#loginBtn { background:#FEE500; color:#1a1a1a; border:none; padding:8px 14px; border-radius:100px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:4px; }

/* ======= MAIN ======= */
.main { display:flex; flex:1; overflow:hidden; position:relative; }
#map { flex:1; z-index:1; }

/* ======= SIDEBAR ======= */
.sidebar { width:360px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; z-index:500; }
.mobile-search-wrap { display:none; padding:8px 12px 0; }
.sidebar-header { padding:14px 14px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.filter-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.filter-chip { background:var(--surface2); border:1.5px solid var(--border); border-radius:100px; padding:5px 12px; font-size:12px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.filter-chip.active { background:var(--accent-pale); border-color:var(--accent); color:var(--accent); }
.sort-row { display:flex; align-items:center; justify-content:space-between; }
.result-count { font-size:13px; color:var(--text-muted); }
.result-count strong { color:var(--text); font-weight:700; }
.sort-select { border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:12px; font-family:'Noto Sans KR',sans-serif; color:var(--text); background:var(--surface2); cursor:pointer; outline:none; }

/* ======= LIST ======= */
.toilet-list { flex:1; overflow-y:auto; padding:10px; -webkit-overflow-scrolling:touch; }
.toilet-list::-webkit-scrollbar { width:4px; }
.toilet-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.toilet-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:8px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.toilet-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--border); transition:background 0.2s; }
.toilet-card:hover, .toilet-card.selected { border-color:var(--accent); box-shadow:var(--shadow); }
.toilet-card:hover::before, .toilet-card.selected::before { background:var(--accent); }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; }
.card-name { font-size:14px; font-weight:700; color:var(--text); line-height:1.3; }
.card-distance { font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-pale); padding:3px 8px; border-radius:100px; white-space:nowrap; margin-left:8px; flex-shrink:0; }
.card-address { font-size:11px; color:var(--text-muted); margin-bottom:8px; line-height:1.4; }
.card-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.tag { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:500; }
.tag-open { background:#d8f3dc; color:#2d6a4f; }
.tag-closed { background:#fde8ea; color:#e63946; }
.tag-24h { background:#e8f4fd; color:#2196f3; }
.tag-disabled { background:#f3e8fd; color:#7b2d8b; }
.tag-baby { background:#fff8e1; color:#f57c00; }
.card-rating { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.stars { color:#ffd93d; font-size:12px; }
.rating-num { font-size:13px; font-weight:700; }
.rating-count { font-size:11px; color:var(--text-muted); }
.cleanliness-bar-wrap { display:flex; align-items:center; gap:8px; }
.cleanliness-label { font-size:11px; color:var(--text-muted); width:34px; flex-shrink:0; }
.cleanliness-bar { flex:1; height:5px; background:var(--surface2); border-radius:100px; overflow:hidden; }
.cleanliness-fill { height:100%; border-radius:100px; transition:width 0.6s; }
.loading-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; color:var(--text-muted); gap:10px; font-size:13px; text-align:center; padding:20px; }
.spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ======= STATS BAR ======= */
.stats-bar { position:absolute; top:12px; left:12px; display:flex; gap:8px; z-index:800; pointer-events:none; }
.stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:5px 12px; font-size:11px; font-weight:500; box-shadow:var(--shadow); display:flex; align-items:center; gap:4px; pointer-events:all; }

/* ======= DETAIL PANEL ======= */
.detail-panel { position:absolute; bottom:20px; right:20px; width:340px; max-height:calc(100% - 40px); background:var(--surface); border-radius:20px; box-shadow:var(--shadow-lg); border:1px solid var(--border); z-index:900; overflow:hidden; display:flex; flex-direction:column; transform:translateY(20px); opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.detail-panel.visible { transform:translateY(0); opacity:1; pointer-events:all; }
.detail-header { padding:18px 18px 14px; border-bottom:1px solid var(--border); background:linear-gradient(135deg,var(--accent-pale) 0%,#fff 100%); position:relative; flex-shrink:0; }
.detail-close { position:absolute; top:12px; right:12px; width:28px; height:28px; border-radius:50%; border:none; background:rgba(255,255,255,0.9); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); }
.detail-name { font-size:16px; font-weight:800; margin-bottom:4px; padding-right:36px; }
.detail-address { font-size:11px; color:var(--text-muted); margin-bottom:10px; }
.detail-badges { display:flex; gap:5px; flex-wrap:wrap; }
.detail-body { padding:14px 18px; overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.detail-body::-webkit-scrollbar { width:3px; }
.detail-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.detail-section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; margin-top:14px; }
.detail-section-title:first-child { margin-top:0; }
.detail-rating-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.detail-big-rating { font-size:36px; font-weight:900; color:var(--text); line-height:1; }
.detail-stars { font-size:16px; color:#ffd93d; margin-bottom:2px; }
.detail-review-count { font-size:11px; color:var(--text-muted); }
.detail-metrics { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
.metric-row { display:flex; align-items:center; gap:8px; }
.metric-label { font-size:11px; color:var(--text-muted); width:50px; flex-shrink:0; }
.metric-bar { flex:1; height:7px; background:var(--surface2); border-radius:100px; overflow:hidden; }
.metric-fill { height:100%; border-radius:100px; }
.metric-score { font-size:11px; font-weight:700; width:22px; text-align:right; }
.realtime-votes { background:var(--surface2); border-radius:12px; padding:10px; margin-bottom:12px; }
.realtime-title { font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:8px; display:flex; align-items:center; gap:5px; }
.live-dot { width:6px; height:6px; background:var(--urgent); border-radius:50%; animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.vote-items { display:flex; gap:6px; flex-wrap:wrap; }
.vote-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:5px 9px; font-size:11px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:3px; font-weight:500; }
.vote-item:hover { border-color:var(--accent); color:var(--accent); }
.vote-item.voted { background:var(--accent-pale); border-color:var(--accent); color:var(--accent); }
.detail-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
.info-item { background:var(--surface2); border-radius:10px; padding:8px 10px; }
.info-item-label { font-size:10px; color:var(--text-muted); margin-bottom:2px; }
.info-item-value { font-size:12px; font-weight:600; }
.detail-reviews { margin-bottom:12px; }
.review-item { border-bottom:1px solid var(--border); padding:8px 0; }
.review-item:last-child { border-bottom:none; }
.review-top { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
.review-stars { font-size:11px; color:#ffd93d; }
.review-time { font-size:10px; color:var(--text-muted); margin-left:auto; }
.review-text { font-size:12px; color:var(--text); line-height:1.4; }
.btn-navigate { width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.2s; }
.btn-navigate:hover { background:var(--accent-light); }

/* ======= POPUP ======= */
.leaflet-popup-content-wrapper { border-radius:12px !important; box-shadow:var(--shadow-lg) !important; border:1px solid var(--border) !important; padding:0 !important; }
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-tip-container { display:none; }
.map-popup { padding:12px 14px; min-width:180px; }
.map-popup-name { font-size:13px; font-weight:700; margin-bottom:3px; font-family:'Noto Sans KR',sans-serif; }
.map-popup-dist { font-size:11px; color:var(--accent); font-weight:600; margin-bottom:8px; }
.map-popup-btn { width:100%; background:var(--accent); color:white; border:none; padding:7px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

/* ======= TOAST ======= */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a2e; color:white; padding:10px 22px; border-radius:100px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:all 0.3s; z-index:9999; white-space:nowrap; max-width:90vw; text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ======= URGENT ======= */
.urgent-overlay { display:none; position:fixed; inset:0; background:rgba(230,57,70,0.95); z-index:9000; align-items:center; justify-content:center; flex-direction:column; gap:20px; padding:24px; }
.urgent-overlay.show { display:flex; }
.urgent-content { text-align:center; color:white; }
.urgent-emoji { font-size:70px; animation:shake 0.4s infinite; }
@keyframes shake { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
.urgent-title { font-size:24px; font-weight:900; margin:12px 0 6px; }
.urgent-name { font-size:18px; font-weight:700; opacity:0.9; margin-bottom:4px; }
.urgent-dist { font-size:14px; opacity:0.8; margin-bottom:20px; }
.urgent-close { background:white; color:var(--urgent); border:none; padding:13px 36px; border-radius:100px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }

/* ======= 📱 MOBILE ======= */
@media (max-width: 768px) {
  :root { --header-h: 54px; }

  header { padding:0 10px; gap:6px; }
  .logo-sub { display:none; }
  .logo { font-size:14px; gap:6px; }
  .logo-icon { width:28px; height:28px; font-size:14px; }
  /* PC 검색바 숨김 */
  .header-center { display:none; }
  /* 버튼 아이콘만 */
  .btn-text { display:none; }
  .btn-locate { padding:7px 10px; border-radius:100px; font-size:15px; }
  #loginBtn { padding:7px 10px; font-size:14px; }
  .btn-urgent { padding:7px 11px; font-size:15px; border-radius:100px; }

  /* 지도 전체 화면 */
  .main { display:block; height:calc(100dvh - var(--header-h)); position:relative; }
  #map { position:absolute; inset:0; z-index:1; width:100%; height:100%; }

  /* 사이드바 = 바텀시트 */
  .sidebar {
    position:absolute; bottom:0; left:0; right:0; width:100%;
    height:50vh; border-radius:20px 20px 0 0;
    border-right:none; border-top:1px solid var(--border);
    z-index:600; box-shadow:0 -4px 24px rgba(0,0,0,0.12);
  }
  /* 핸들 */
  .sidebar::before { content:''; display:block; width:40px; height:4px; background:var(--border); border-radius:100px; margin:10px auto 0; flex-shrink:0; }

  /* 모바일 검색바 표시 */
  .mobile-search-wrap { display:block !important; }

  /* 상세 패널 = 바텀시트 풀스크린 */
  .detail-panel {
    position:fixed; bottom:0; left:0; right:0; width:100%;
    max-height:88vh; border-radius:20px 20px 0 0;
    transform:translateY(100%); opacity:1;
    box-shadow:0 -4px 40px rgba(0,0,0,0.18); z-index:800;
  }
  .detail-panel.visible { transform:translateY(0); }
  /* 핸들 */
  .detail-header::before { content:''; display:block; width:40px; height:4px; background:rgba(0,0,0,0.15); border-radius:100px; margin:0 auto 12px; }

  /* 통계바 */
  .stats-bar { top:8px; left:8px; gap:5px; max-width:calc(100vw - 16px); flex-wrap:wrap; }
  .stat-chip { font-size:10px; padding:4px 10px; }

  /* 토스트 → 바텀시트 위 */
  .toast { bottom:52vh; }
}

@media (max-width: 375px) {
  .stat-chip:nth-child(3) { display:none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚻</div>
    <div>
      화장실 지도
      <span class="logo-sub">전국 공중화장실 찾기</span>
    </div>
  </div>

  <div class="header-center">
    <div class="search-bar">
      <span style="color:var(--text-muted);font-size:15px;flex-shrink:0;">🔍</span>
      <input type="text" placeholder="장소, 지역명으로 검색하세요" id="searchInput" oninput="handleSearch(this.value)">
    </div>
  </div>

  <div class="header-right">
    <button class="btn-locate" onclick="locateMe()">📍<span class="btn-text"> 내 위치</span></button>
    <button id="loginBtn" onclick="kakaoLogin()">🔑<span class="btn-text"> 카카오 로그인</span></button>
    <button class="btn-urgent" onclick="showUrgentMode()">🚨<span class="btn-text"> 급함 모드</span></button>
  </div>
</header>

<div class="main">
  <div id="map"></div>

  <div class="stats-bar">
    <div class="stat-chip">🟢 영업중 <strong id="statOpen">-</strong></div>
    <div class="stat-chip">✨ 평균청결 <strong id="statClean">-</strong></div>
    <div class="stat-chip">📍 반경 <strong>2km</strong></div>
  </div>

  <div class="sidebar">
    <!-- 모바일 검색바 -->
    <div class="mobile-search-wrap" id="mobileSearchWrap">
      <div class="search-bar" style="margin-bottom:0;">
        <span style="color:var(--text-muted);font-size:14px;flex-shrink:0;">🔍</span>
        <input type="text" placeholder="장소, 지역명으로 검색" oninput="handleSearch(this.value)" style="padding:8px 0;font-size:13px;">
      </div>
    </div>

    <div class="sidebar-header">
      <div class="filter-row">
        <div class="filter-chip active" onclick="toggleFilter(this,'all')">전체</div>
        <div class="filter-chip" onclick="toggleFilter(this,'24h')">🌙 24시간</div>
        <div class="filter-chip" onclick="toggleFilter(this,'disabled')">♿ 장애인</div>
        <div class="filter-chip" onclick="toggleFilter(this,'baby')">👶 기저귀</div>
        <div class="filter-chip" onclick="toggleFilter(this,'clean')">✨ 청결</div>
      </div>
      <div class="sort-row">
        <span class="result-count">주변 <strong id="countDisplay">0</strong>개 화장실</span>
        <select class="sort-select" onchange="sortList(this.value)">
          <option value="distance">거리순</option>
          <option value="rating">별점순</option>
          <option value="clean">청결도순</option>
        </select>
      </div>
    </div>

    <div class="toilet-list" id="toiletList">
      <div class="loading-msg">
        <div class="spinner"></div>
        <span>주변 화장실을 찾는 중...</span>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-address" id="detailAddress"></div>
      <div class="detail-badges" id="detailBadges"></div>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- URGENT -->
<div class="urgent-overlay" id="urgentOverlay">
  <div class="urgent-content">
    <div class="urgent-emoji">🚨</div>
    <div class="urgent-title">가장 가까운 화장실</div>
    <div class="urgent-name" id="urgentName"></div>
    <div class="urgent-dist" id="urgentDist"></div>
  </div>
  <button class="urgent-close" onclick="closeUrgent()">확인했어요 😮‍💨</button>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

// ✅ 설정값
// =============================================

  apiKey: "AIzaSyC0wW0pdpavag53mMFYBAap71XnumdiMnk",
  authDomain: "hwajangsil-jido.firebaseapp.com",
  projectId: "hwajangsil-jido",

  // 공공데이터포털 전국 공중화장실 Open API (JSON)
  // 여러 CORS 프록시 방식 순서대로 시도
  const dataURL = 'https://api.odcloud.kr/api/15012483/v1/uddi:fc4bf8d8-c85c-4b3e-9e91-7f785ebf0ad3?page=1&perPage=1000&serviceKey=YOUR_KEY';
  
  // 공공 CSV 직접 방식 (CORS 프록시 경유)
  const CSV_SOURCES = [
    'https://corsproxy.io/?url=https%3A%2F%2Fwww.localdata.go.kr%2FdownloadData.do%3FmenuNo%3D20025',
    'https://api.allorigins.win/raw?url=https%3A%2F%2Fwww.localdata.go.kr%2FdownloadData.do%3FmenuNo%3D20025',
    'https://corsproxy.io/?url=https%3A%2F%2Fraw.githubusercontent.com%2FPublicToilet%2Fpublic-toilet-korea%2Fmain%2Fdata%2Fpublic_toilet.csv',
    'https://api.allorigins.win/raw?url=https%3A%2F%2Fraw.githubusercontent.com%2FPublicToilet%2Fpublic-toilet-korea%2Fmain%2Fdata%2Fpublic_toilet.csv',
  ];

  let text = null;
  for (const src of CSV_SOURCES) {
    try {
      const ctrl = new AbortController();

// CSV 파싱
function parseToiletsCSV(text, lat, lng) {
  // TSV도 지원
  const sep = text.includes('\t') ? '\t' : ',';
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  // BOM 제거
  lines[0] = lines[0].replace(/^\uFEFF/, '');

  const rawHeaders = sep === '\t'
    ? lines[0].split('\t').map(h => h.trim().replace(/"/g, ''))
    : parseCSVLine(lines[0]).map(h => h.trim().replace(/"/g, ''));
  console.log('헤더:', rawHeaders.join(', '));

  const result = [];
  for (let i = 1; i < Math.min(lines.length, 100000); i++) {
    try {
      const cols = sep === '\t'
        ? lines[i].split('\t').map(c => c.trim().replace(/"/g, ''))
        : parseCSVLine(lines[i]).map(c => c.trim().replace(/"/g, ''));

      const obj = {};
      rawHeaders.forEach((h, idx) => { obj[h] = cols[idx] || ''; });

      // 위경도 (다양한 컬럼명 대응)
      const iLat = parseFloat(
        obj['WGS84위도'] || obj['위도'] || obj['LAT'] || obj['lat'] ||
        obj['latitude'] || obj['Y좌표'] || obj['y좌표'] || obj['위도(Y)'] || 0
      );
      const iLng = parseFloat(
        obj['WGS84경도'] || obj['경도'] || obj['LNG'] || obj['lng'] ||
        obj['longitude'] || obj['X좌표'] || obj['x좌표'] || obj['경도(X)'] || 0
      );

      if (!iLat || !iLng) continue;
      // 한국 영역 체크
      if (iLat < 33 || iLat > 38.9 || iLng < 124 || iLng > 132) continue;

      const dist = calcDistance(lat, lng, iLat, iLng);
      if (dist > 2000) continue;

      const name = (obj['화장실명'] || obj['명칭'] || obj['시설명'] || obj['화장실 명'] || '공중화장실').substring(0, 40);
      const address = obj['소재지도로명주소'] || obj['소재지지번주소'] || obj['주소'] || obj['소재지'] || obj['도로명주소'] || '주소 정보 없음';
      const hours = obj['개방시간'] || obj['운영시간'] || obj['이용시간'] || '-';
      const is24h = hours.includes('24') || hours.toLowerCase().includes('종일') || hours === '-';
      const isDisabled = (obj['장애인화장실여부'] || obj['장애인'] || '') === 'Y';
      const isBaby = (obj['기저귀교환대여부'] || obj['기저귀'] || obj['기저귀교환대'] || '') === 'Y';

      const tags = [];
      if (is24h) tags.push('24h');
      if (isDisabled) tags.push('disabled');
      if (isBaby) tags.push('baby');

      result.push({
        id: 'pub_' + i,
        name: name,
        address: address,
        lat: iLat, lng: iLng,
        distance: Math.round(dist),
        rating: 0, reviewCount: 0,
        open: true,
        hours: hours,
        tags: tags,
        cleanliness: 0, smell: 0, paper: 0, soap: 0,
        reviews: [],
        votes: { paper: 0, soap: 0, smell: 0, queue: 0 }
      });
    } catch(e) { /* skip */ }
  }

  console.log('파싱 결과:', result.length, '개 (반경 2km)');
  return result.sort((a, b) => a.distance - b.distance).slice(0, 80);
}

// Firebase 리뷰 불러오기
async function loadReviewsFromFirebase() {
  if (!db) return;
  try {
    const snap = await db.collection('toilets').get();
    snap.forEach(doc => {
      const t = toilets.find(x => x.id === doc.id);
      if (t) {
        const d = doc.data();
        t.rating = d.rating || 0;
        t.reviewCount = d.reviewCount || 0;
        t.cleanliness = d.cleanliness || 0;
        t.smell = d.smell || 0;
        t.paper = d.paper || 0;
        t.soap = d.soap || 0;
        t.reviews = d.reviews || [];
        t.votes = d.votes || { paper: 0, soap: 0, smell: 0, queue: 0 };
      }
    });
  } catch(e) { console.warn('Firebase 리뷰 로딩 실패:', e); }
}

// 리뷰 저장
async function submitReview(toiletId, stars, text) {
  if (!currentUser) { showToast('❌ 로그인이 필요해요!'); kakaoLogin(); return; }
  if (!db) { showToast('❌ Firebase 미설정'); return; }
  const t = toilets.find(x => x.id === toiletId);
  if (!t) return;
  const review = { stars, text, author: currentUser.name, time: new Date().toISOString() };
  t.reviews.unshift(review);
  const newRating = +(t.reviews.reduce((s, r) => s + r.stars, 0) / t.reviews.length).toFixed(1);
  t.rating = newRating; t.reviewCount = t.reviews.length;
  try {
    await db.collection('toilets').doc(String(toiletId)).set({
      rating: newRating, reviewCount: t.reviews.length,
      reviews: t.reviews.slice(0, 20),
      cleanliness: t.cleanliness, smell: t.smell, paper: t.paper, soap: t.soap, votes: t.votes
    }, { merge: true });
    showToast('✅ 리뷰가 등록됐어요!');
    openDetail(toiletId);
  } catch(e) { console.error(e); showToast('❌ 리뷰 저장 실패'); }
}

// CSV 한 줄 파싱
function parseCSVLine(line) {
  const result = []; let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') inQuote = !inQuote;
    else if (line[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
    else cur += line[i];
  }
  result.push(cur);
  return result;
}

// 거리 계산
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([userLat, userLng], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('click', () => { if (selectedId) closeDetail(); });
  setTimeout(() => map.invalidateSize(), 200);
  initFetch();
}

function initFetch() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        map.setView([userLat, userLng], 15);
        addUserMarker(userLat, userLng);
        fetchToiletsFromAPI(userLat, userLng);
      },
      err => {
        console.warn('위치 실패:', err);
        showToast('📍 위치 권한 없음 — 기본 위치(서울역) 사용');
        addUserMarker(userLat, userLng);
        fetchToiletsFromAPI(userLat, userLng);
      },
      { timeout: 8000, maximumAge: 30000 }
    );
  } else {
    addUserMarker(userLat, userLng);
    fetchToiletsFromAPI(userLat, userLng);
  }
}

function addUserMarker(lat, lng) {
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker([lat, lng], {
    radius: 10, fillColor: '#2196f3', color: 'white', weight: 3, fillOpacity: 0.9, zIndexOffset: 1000
  }).addTo(map).bindPopup('📍 내 위치');
}

// =============================================
// 마커 렌더링
// =============================================
function getMarkerColor(t) {
  if (!t.open) return '#aaaaaa';
  if (t.cleanliness >= 80) return '#2d6a4f';
  if (t.cleanliness >= 50) return '#f57c00';
  if (t.cleanliness > 0) return '#e63946';
  return '#2d6a4f'; // 기본 초록
}

function renderMarkers() {
  markers.forEach(m => { try { map.removeLayer(m); } catch(e){} });
  markers = [];
  if (!toilets.length) return;

  // 팝업 id 맵
  window._tidMap = {};

  toilets.forEach(t => {
    const color = getMarkerColor(t);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:30px;height:30px;background:${color};border:2.5px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:12px;line-height:1;">🚻</span></div>`,
      iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -32]
    });

    const marker = L.marker([t.lat, t.lng], { icon }).addTo(map);
    const k = String(t.id).replace(/\W/g, '_');
    window._tidMap[k] = t.id;

    marker.bindPopup(`
      <div class="map-popup">
        <div class="map-popup-name">${esc(t.name)}</div>
        <div class="map-popup-dist">📍 ${t.distance}m · ${t.open ? '🟢 영업중' : '🔴 종료'}</div>
        <button class="map-popup-btn" onclick="openDetailByKey('${k}')">상세 정보 보기 →</button>
      </div>
    `, { maxWidth: 220 });

    marker.on('click', () => { openDetail(t.id); highlightCard(t.id); });
    markers.push(marker);
  });
}

function openDetailByKey(k) {
  const id = window._tidMap && window._tidMap[k];
  if (id !== undefined) openDetail(id);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderList(data) {

    return;
  }

  list.innerHTML = data.map(t => {

          <div class="card-name">${esc(t.name)}</div>

        </div>

        <div class="cleanliness-bar-wrap">
          <span class="cleanliness-label">청결도</span>
          <div class="cleanliness-bar"><div class="cleanliness-fill" style="width:${t.cleanliness}%;background:${cleanColor}"></div></div>

function selectCard(id) {
  highlightCard(id);
  const t = toilets.find(x => String(x.id) === String(id));
  if (t) map.setView([t.lat, t.lng], 16);
  openDetail(id);
}

function highlightCard(id) {
  document.querySelectorAll('.toilet-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

function updateStats() {
  const openCount = toilets.filter(t => t.open).length;
  const cleanArr = toilets.filter(t => t.cleanliness > 0);
  const avgClean = cleanArr.length
    ? (cleanArr.reduce((s, t) => s + t.cleanliness, 0) / cleanArr.length).toFixed(0) + '%'
    : '-';
  document.getElementById('statOpen').textContent = openCount || '-';
  document.getElementById('statClean').textContent = avgClean;
}

    <span class="tag ${t.open ? 'tag-open' : 'tag-closed'}">${t.open ? '🟢 영업중' : '🔴 영업종료'}</span>
    ${t.tags.includes('24h') ? '<span class="tag tag-24h">🌙 24시간</span>' : ''}
    ${t.tags.includes('disabled') ? '<span class="tag tag-disabled">♿ 장애인</span>' : ''}
    ${t.tags.includes('baby') ? '<span class="tag tag-baby">👶 기저귀</span>' : ''}
  `;

  const metrics = [
    { label:'청결도', val:t.cleanliness, color:'#2d6a4f' },
    { label:'냄새', val:t.smell, color:'#40916c' },
    { label:'휴지', val:t.paper, color:'#2196f3' },
    { label:'비누', val:t.soap, color:'#9c27b0' },
  ];

  const sk = String(id).replace(/\W/g, '_');
  const reviewHTML = t.reviews.length > 0
    ? t.reviews.slice(0, 5).map(r => `
        <div class="review-item">
          <div class="review-top">
            <span class="review-stars">${getStars(r.stars)}</span>
            <span style="font-size:11px;font-weight:600;color:var(--text-muted);margin-left:4px;">${esc(r.author||'익명')}</span>
            <span class="review-time">${r.time ? new Date(r.time).toLocaleDateString('ko-KR') : ''}</span>
          </div>
          <div class="review-text">${esc(r.text)}</div>
        </div>`).join('')
    : '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">아직 리뷰가 없어요. 첫 리뷰를 남겨보세요!</div>';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section-title">청결도 평가</div>
    <div class="detail-rating-row">
      <div class="detail-big-rating">${t.rating > 0 ? t.rating : '-'}</div>
      <div>
        <div class="detail-stars">${getStars(t.rating)}</div>
        <div class="detail-review-count">${t.reviewCount}개 리뷰</div>
      </div>
    </div>
    <div class="detail-metrics">
      ${metrics.filter(m => m.val > 0).map(m => `
        <div class="metric-row">
          <span class="metric-label">${m.label}</span>
          <div class="metric-bar"><div class="metric-fill" style="width:${m.val}%;background:${m.color}"></div></div>
          <span class="metric-score" style="color:${m.color}">${m.val}</span>
        </div>`).join('')}
    </div>
    <div class="realtime-votes">
      <div class="realtime-title"><div class="live-dot"></div>실시간 현황 (최근 1시간)</div>
      <div class="vote-items">
        <div class="vote-item" onclick="vote(this)">🧻 휴지 있음 <strong>${t.votes.paper}</strong></div>
        <div class="vote-item" onclick="vote(this)">🧼 비누 있음 <strong>${t.votes.soap}</strong></div>
        <div class="vote-item" onclick="vote(this)">😷 냄새남 <strong>${t.votes.smell}</strong></div>
        <div class="vote-item" onclick="vote(this)">🚶 줄 있음 <strong>${t.votes.queue}</strong></div>
      </div>
    </div>
    <div class="detail-section-title">상세 정보</div>
    <div class="detail-info-grid">
      <div class="info-item"><div class="info-item-label">운영시간</div><div class="info-item-value">${esc(t.hours)}</div></div>
      <div class="info-item"><div class="info-item-label">거리</div><div class="info-item-value">${t.distance}m</div></div>
      <div class="info-item"><div class="info-item-label">장애인 시설</div><div class="info-item-value">${t.tags.includes('disabled') ? '✅ 있음' : '❌ 없음'}</div></div>
      <div class="info-item"><div class="info-item-label">기저귀교환대</div><div class="info-item-value">${t.tags.includes('baby') ? '✅ 있음' : '❌ 없음'}</div></div>
    </div>
    <div class="detail-section-title">최근 리뷰</div>
    <div class="detail-reviews">${reviewHTML}</div>
    <div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:8px;">리뷰 남기기</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;" id="sp_${sk}">
        ${[1,2,3,4,5].map(n => `<span onclick="pickStar('${sk}',${n})" style="font-size:22px;cursor:pointer;color:#ddd;" data-star="${n}">★</span>`).join('')}
      </div>
      <textarea id="rt_${sk}" placeholder="화장실 상태를 알려주세요..." style="width:100%;height:60px;border:1.5px solid var(--border);border-radius:8px;padding:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;resize:none;outline:none;background:var(--surface);display:block;"></textarea>
      <button onclick="handleReviewSubmit('${id}','${sk}')" style="width:100%;margin-top:8px;background:var(--accent);color:white;border:none;padding:10px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">
        ${currentUser ? '리뷰 등록' : '카카오 로그인 후 리뷰 쓰기'}
      </button>
    </div>
    <button class="btn-navigate" onclick="navigateTo(${t.lat},${t.lng},'${esc(t.name)}')">🗺️ 길찾기</button>
  `;

  document.getElementById('detailPanel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
  selectedId = null;
  document.querySelectorAll('.toilet-card').forEach(c => c.classList.remove('selected'));
}

function navigateTo(lat, lng, name) {
  window.open('https://map.kakao.com/link/to/' + encodeURIComponent(name) + ',' + lat + ',' + lng, '_blank');
}

// =============================================
// 급함 모드
// =============================================
function showUrgentMode() {
  const open = toilets.filter(t => t.open);
  if (!open.length) { showToast('⚠️ 주변 화장실 데이터가 없어요!'); return; }
  const closest = open.sort((a, b) => a.distance - b.distance)[0];
  document.getElementById('urgentName').textContent = closest.name;
  document.getElementById('urgentDist').textContent = '📍 ' + closest.distance + 'm · 도보 약 ' + Math.round(closest.distance / 80) + '분';
  document.getElementById('urgentOverlay').classList.add('show');
  map.setView([closest.lat, closest.lng], 17);
  setTimeout(() => openDetail(closest.id), 400);
}

function closeUrgent() { document.getElementById('urgentOverlay').classList.remove('show'); }

// =============================================
// 내 위치
// =============================================
function locateMe() {
  showToast('📍 위치를 확인하는 중...');
  if (!navigator.geolocation) { showToast('❌ 이 브라우저는 위치를 지원하지 않아요'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      userLat = lat; userLng = lng;
      map.setView([lat, lng], 16);
      addUserMarker(lat, lng);
      showToast('✅ 내 위치를 찾았어요!');
      fetchToiletsFromAPI(lat, lng);
    },
    () => showToast('❌ 위치 권한이 필요해요')
  );
}

// =============================================
// 필터
// =============================================
function toggleFilter(el, key) {
  const chips = document.querySelectorAll('.filter-chip');
  if (key === 'all') {
    chips.forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilters = new Set(['all']);
    renderList(toilets); return;
  }
  chips[0].classList.remove('active');
  el.classList.toggle('active');
  if (el.classList.contains('active')) activeFilters.add(key); else activeFilters.delete(key);
  if (!activeFilters.size) { activeFilters = new Set(['all']); chips[0].classList.add('active'); renderList(toilets); return; }
  activeFilters.delete('all');
  let f = [...toilets];
  if (activeFilters.has('24h')) f = f.filter(t => t.tags.includes('24h'));
  if (activeFilters.has('disabled')) f = f.filter(t => t.tags.includes('disabled'));
  if (activeFilters.has('baby')) f = f.filter(t => t.tags.includes('baby'));
  if (activeFilters.has('clean')) f = f.filter(t => t.cleanliness >= 80);
  renderList(f);
}

// =============================================
// 정렬 / 검색
// =============================================
function sortList(by) {
  const sorted = [...toilets].sort((a, b) => {
    if (by === 'distance') return a.distance - b.distance;
    if (by === 'rating') return b.rating - a.rating;
    if (by === 'clean') return b.cleanliness - a.cleanliness;
    return 0;
  });
  renderList(sorted);
}

function handleSearch(val) {
  if (!val.trim()) { renderList(toilets); return; }
  const q = val.trim();
  renderList(toilets.filter(t => t.name.includes(q) || t.address.includes(q)));
}

// =============================================
// 투표 / 별점 / 리뷰
// =============================================
function vote(el) {
  if (el.classList.contains('voted')) return;
  el.classList.add('voted');
  showToast('✅ 투표해주셔서 감사해요!');
}

function pickStar(sk, n) {
  pickedStars[sk] = n;
  const picker = document.getElementById('sp_' + sk);
  if (!picker) return;
  picker.querySelectorAll('span').forEach(s => {
    s.style.color = parseInt(s.dataset.star) <= n ? '#ffd93d' : '#ddd';
  });
}

function handleReviewSubmit(realId, sk) {
  if (!currentUser) { kakaoLogin(); return; }
  const stars = pickedStars[sk] || 0;
  const textEl = document.getElementById('rt_' + sk);
  const text = textEl ? textEl.value.trim() : '';
  if (!stars) { showToast('⭐ 별점을 선택해주세요!'); return; }
  if (!text) { showToast('✏️ 리뷰 내용을 입력해주세요!'); return; }
  submitReview(realId, stars, text);
}

// =============================================
// 유틸
// =============================================
function getStars(rating) {
  if (!rating || rating <= 0) return '☆☆☆☆☆';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// 리사이즈
window.addEventListener('resize', () => {
  if (map) setTimeout(() => map.invalidateSize(), 100);
  updateLoginUI();
});

// 초기화
window.onload = initMap;
</script>
</body>
</html>
