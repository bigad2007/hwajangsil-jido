<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화장실 지도 — 전국 화장실 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</script>
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --accent: #2d6a4f;
  --accent-light: #40916c;
  --accent-pale: #d8f3dc;
  --urgent: #e63946;
  --urgent-pale: #fde8ea;
  --text: #1a1a2e;
  --text-muted: #888880;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 64px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
  flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  display: block;
  letter-spacing: 0;
  margin-top: -2px;
}

.header-center {
  flex: 1;
  max-width: 480px;
  margin: 0 24px;
}

.search-bar {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 0 16px;
  gap: 8px;
  transition: border-color 0.2s;
}
.search-bar:focus-within { border-color: var(--accent); }
.search-bar input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  color: var(--text);
  padding: 10px 0;
  outline: none;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-icon { color: var(--text-muted); font-size: 16px; }

.header-right { display: flex; gap: 10px; align-items: center; }

.btn-urgent {
  background: var(--urgent);
  color: white;
  border: none;
  padding: 9px 20px;
  border-radius: 100px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 3px 12px rgba(230,57,70,0.35);
  animation: pulse-btn 2s infinite;
}
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 3px 12px rgba(230,57,70,0.35); }
  50% { box-shadow: 0 3px 20px rgba(230,57,70,0.6); }
}
.btn-urgent:hover { transform: scale(1.04); }

.btn-locate {
  background: var(--accent-pale);
  color: var(--accent);
  border: none;
  padding: 9px 18px;
  border-radius: 100px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.2s;
}
.btn-locate:hover { background: #b7e4c7; }

/* MAIN LAYOUT */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 360px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filter-chip {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--accent-pale);
  border-color: var(--accent);
  color: var(--accent);
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }

.sort-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.result-count { font-size: 13px; color: var(--text-muted); }
.result-count strong { color: var(--text); font-weight: 700; }

.sort-select {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  background: var(--surface2);
  cursor: pointer;
  outline: none;
}

/* TOILET LIST */
.toilet-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.toilet-list::-webkit-scrollbar { width: 4px; }
.toilet-list::-webkit-scrollbar-track { background: transparent; }
.toilet-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.toilet-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.toilet-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--border);
  transition: background 0.2s;
}
.toilet-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-1px); }
.toilet-card:hover::before { background: var(--accent); }
.toilet-card.selected { border-color: var(--accent); box-shadow: var(--shadow); }
.toilet-card.selected::before { background: var(--accent); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.card-distance {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-pale);
  padding: 3px 10px;
  border-radius: 100px;
  white-space: nowrap;
  margin-left: 8px;
  flex-shrink: 0;
}

.card-address {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  line-height: 1.5;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.tag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 500;
}
.tag-open { background: #d8f3dc; color: #2d6a4f; }
.tag-closed { background: #fde8ea; color: #e63946; }
.tag-24h { background: #e8f4fd; color: #2196f3; }
.tag-disabled { background: #f3e8fd; color: #7b2d8b; }
.tag-baby { background: #fff8e1; color: #f57c00; }

.card-rating {
  display: flex;
  align-items: center;
  gap: 8px;
}
.stars { color: #ffd93d; font-size: 13px; letter-spacing: 1px; }
.rating-num { font-size: 13px; font-weight: 700; color: var(--text); }
.rating-count { font-size: 11px; color: var(--text-muted); }

.cleanliness-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.cleanliness-label { font-size: 11px; color: var(--text-muted); width: 36px; }
.cleanliness-bar {
  flex: 1;
  height: 5px;
  background: var(--surface2);
  border-radius: 100px;
  overflow: hidden;
}
.cleanliness-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s ease;
}

/* MAP */
#map {
  flex: 1;
  z-index: 1;
}

/* DETAIL PANEL */
.detail-panel {
  position: absolute;
  bottom: 24px;
  right: 24px;
  width: 340px;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  z-index: 900;
  overflow: hidden;
  transform: translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.detail-panel.visible {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
}

.detail-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--accent-pale) 0%, #fff 100%);
}
.detail-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
}
.detail-name {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 4px;
  padding-right: 32px;
}
.detail-address { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; }

.detail-body { padding: 16px 20px; }

.detail-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.detail-rating-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.detail-big-rating {
  font-size: 40px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
}
.detail-stars { font-size: 18px; color: #ffd93d; margin-bottom: 2px; }
.detail-review-count { font-size: 12px; color: var(--text-muted); }

.detail-metrics { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.metric-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.metric-label { font-size: 12px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
.metric-bar {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 100px;
  overflow: hidden;
}
.metric-fill {
  height: 100%;
  border-radius: 100px;
}
.metric-score { font-size: 12px; font-weight: 700; width: 24px; text-align: right; }

.realtime-votes {
  background: var(--surface2);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
}
.realtime-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--urgent);
  border-radius: 50%;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.vote-items { display: flex; gap: 8px; flex-wrap: wrap; }
.vote-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
  font-weight: 500;
}
.vote-item:hover { border-color: var(--accent); color: var(--accent); }
.vote-item.voted { background: var(--accent-pale); border-color: var(--accent); color: var(--accent); }

.detail-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.info-item {
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.info-item-label { font-size: 10px; color: var(--text-muted); }
.info-item-value { font-size: 13px; font-weight: 600; }

.detail-reviews { margin-bottom: 16px; }
.review-item {
  border-bottom: 1px solid var(--border);
  padding: 10px 0;
}
.review-item:last-child { border-bottom: none; }
.review-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.review-stars { font-size: 11px; color: #ffd93d; }
.review-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.review-text { font-size: 12px; color: var(--text); line-height: 1.5; }

.btn-navigate {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s;
}
.btn-navigate:hover { background: var(--accent-light); transform: scale(1.02); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* URGENT OVERLAY */
.urgent-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(230,57,70,0.95);
  z-index: 9000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  animation: urgentIn 0.3s ease;
}
.urgent-overlay.show { display: flex; }
@keyframes urgentIn { from { opacity:0; transform:scale(1.05); } to { opacity:1; transform:scale(1); } }
.urgent-content { text-align: center; color: white; }
.urgent-emoji { font-size: 80px; animation: shake 0.4s infinite; }
@keyframes shake { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
.urgent-title { font-size: 28px; font-weight: 900; margin: 16px 0 8px; }
.urgent-name { font-size: 22px; font-weight: 700; opacity: 0.9; margin-bottom: 6px; }
.urgent-dist { font-size: 16px; opacity: 0.8; margin-bottom: 24px; }
.urgent-close {
  background: white;
  color: var(--urgent);
  border: none;
  padding: 14px 40px;
  border-radius: 100px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}

/* Leaflet custom markers */
.custom-marker {
  background: var(--accent);
  border: 3px solid white;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
}

.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: var(--shadow-lg) !important;
  border: 1px solid var(--border) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip-container { display: none; }

.map-popup {
  padding: 14px 16px;
  min-width: 180px;
}
.map-popup-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.map-popup-dist { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.map-popup-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}

/* STATS BAR */
.stats-bar {
  position: absolute;
  top: 80px;
  left: 380px;
  display: flex;
  gap: 10px;
  z-index: 800;
  padding: 0 16px;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 6px;
}

@media (max-width: 768px) {
  .sidebar { width: 100%; position: absolute; bottom: 0; left: 0; right: 0; height: 50vh; z-index: 500; border-radius: 20px 20px 0 0; }
  .detail-panel { left: 12px; right: 12px; width: auto; bottom: 12px; }
  .stats-bar { left: 12px; top: 72px; }
  .header-center { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🚻</div>
    <div>
      화장실 지도
      <span class="logo-sub">전국 공중화장실 찾기</span>
    </div>
  </div>
  <div class="header-center">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="장소, 지역명으로 검색하세요" id="searchInput" oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="header-right">
    <button class="btn-locate" onclick="locateMe()">📍 내 위치</button>
    <button id="loginBtn" class="btn-locate" onclick="kakaoLogin()" style="background:#FEE500;color:#1a1a1a;font-weight:700;">카카오 로그인</button>
    <button class="btn-urgent" onclick="showUrgentMode()">🚨 급함 모드</button>
  </div>
</header>

<div class="main" style="position:relative;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="filter-row" id="filterRow">
        <div class="filter-chip active" onclick="toggleFilter(this,'all')">전체</div>
        <div class="filter-chip" onclick="toggleFilter(this,'24h')">🌙 24시간</div>
        <div class="filter-chip" onclick="toggleFilter(this,'disabled')">♿ 장애인</div>
        <div class="filter-chip" onclick="toggleFilter(this,'baby')">👶 기저귀</div>
        <div class="filter-chip" onclick="toggleFilter(this,'clean')">✨ 청결 높음</div>
      </div>
      <div class="sort-row">
        <span class="result-count">주변 <strong id="countDisplay">12</strong>개의 화장실</span>
        <select class="sort-select" onchange="sortList(this.value)">
          <option value="distance">거리순</option>
          <option value="rating">별점순</option>
          <option value="clean">청결도순</option>
        </select>
      </div>
    </div>
    <div class="toilet-list" id="toiletList"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-chip">🟢 영업중 <strong>9</strong></div>
    <div class="stat-chip">✨ 청결 <strong>평균 3.8</strong></div>
    <div class="stat-chip">📍 반경 <strong>500m</strong></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div style="position:relative;">
      <div class="detail-header">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-address" id="detailAddress"></div>
        <div class="detail-badges" id="detailBadges"></div>
      </div>
      <div class="detail-body">
        <div class="detail-section-title">청결도 평가</div>
        <div class="detail-rating-row">
          <div class="detail-big-rating" id="detailRating"></div>
          <div>
            <div class="detail-stars" id="detailStars"></div>
            <div class="detail-review-count" id="detailReviewCount"></div>
          </div>
        </div>

        <div class="detail-metrics" id="detailMetrics"></div>

        <div class="realtime-votes">
          <div class="realtime-title">
            <div class="live-dot"></div>
            실시간 현황 (최근 1시간)
          </div>
          <div class="vote-items" id="voteItems"></div>
        </div>

        <div class="detail-section-title">상세 정보</div>
        <div class="detail-info-grid" id="detailInfoGrid"></div>

        <div class="detail-section-title">최근 리뷰</div>
        <div class="detail-reviews" id="detailReviews"></div>

        <button class="btn-navigate" id="btnNavigate">
          🗺️ 길찾기
        </button>
      </div>
    </div>
  </div>
</div>

<!-- URGENT OVERLAY -->
<div class="urgent-overlay" id="urgentOverlay">

// ===== 전국 화장실 데이터 =====
async function fetchToiletsFromAPI(lat, lng) {
  showToast('🔄 주변 화장실을 찾는 중...');
  try {
    // 여러 CORS 프록시 시도
    const proxies = [
      'https://corsproxy.io/?url=',
      'https://api.allorigins.win/raw?url=',
    ];
    const dataUrl = encodeURIComponent('https://file.localdata.go.kr/file/public_restroom_info/info');
    
    let text = null;
    for (const proxy of proxies) {
      try {
        const res = await fetch(proxy + dataUrl, { signal: AbortSignal.timeout(8000) });
        if (res.ok) { text = await res.text(); break; }
      } catch(e) { continue; }
    }

    if (!text) throw new Error('데이터 없음');

    const lines = text.split('\n').filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));

    const allToilets = lines.slice(1).map((line, i) => {
      const cols = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, idx) => obj[h] = (cols[idx] || '').trim().replace(/"/g,''));
      const iLat = parseFloat(obj['WGS84위도'] || obj['위도'] || 0);
      const iLng = parseFloat(obj['WGS84경도'] || obj['경도'] || 0);
      if (!iLat || !iLng) return null;
      const dist = calcDistance(lat, lng, iLat, iLng);
      if (dist > 2000) return null;
      return {
        id: 'public_' + i,
        name: obj['화장실명'] || '공중화장실',
        address: obj['소재지도로명주소'] || obj['소재지지번주소'] || '주소 없음',
        lat: iLat, lng: iLng, distance: Math.round(dist),
        rating: 0, reviewCount: 0, open: true,
        hours: obj['개방시간'] || '정보 없음',
        tags: [
          ...(obj['장애인화장실여부']==='Y' ? ['disabled'] : []),
          ...(obj['기저귀교환대여부']==='Y' ? ['baby'] : []),
          ...(obj['개방시간'] && obj['개방시간'].includes('24') ? ['24h'] : []),
        ],
        cleanliness: 0, smell: 0, paper: 0, soap: 0,
        reviews: [], votes: {paper:0, soap:0, smell:0, queue:0}
      };
    }).filter(Boolean).sort((a,b) => a.distance - b.distance).slice(0, 50);

    if (allToilets.length === 0) throw new Error('주변 없음');
    toilets = allToilets;

    // Firebase에서 리뷰 데이터 불러오기
    if (db) await loadReviewsFromFirebase();

    renderMarkers(); renderList(toilets);
    showToast(`✅ 주변 ${toilets.length}개 화장실 발견!`);
  } catch(err) {
    console.error(err);
    toilets = getSampleData();
    renderMarkers(); renderList(toilets);
    showToast('⚠️ 샘플 데이터로 실행 중 (위치 확인 필요)');
  }
}

// Firebase에서 리뷰/평점 불러오기
async function loadReviewsFromFirebase() {
  if (!db) return;
  try {
    const snap = await db.collection('toilets').get();
    snap.forEach(doc => {
      const t = toilets.find(x => x.id === doc.id);
      if (t) {
        const d = doc.data();
        t.rating = d.rating || 0;
        t.reviewCount = d.reviewCount || 0;
        t.cleanliness = d.cleanliness || 0;
        t.smell = d.smell || 0;
        t.paper = d.paper || 0;
        t.soap = d.soap || 0;
        t.reviews = d.reviews || [];
        t.votes = d.votes || {paper:0, soap:0, smell:0, queue:0};
      }
    });
  } catch(e) { console.warn('Firebase 리뷰 로딩 실패:', e); }
}

// 리뷰 저장
async function submitReview(toiletId, stars, text) {
  if (!currentUser) { showToast('❌ 로그인이 필요해요!'); kakaoLogin(); return; }
  if (!db) { showToast('❌ DB 미설정'); return; }
  const t = toilets.find(x => x.id === toiletId);
  if (!t) return;

  const review = { stars, text, author: currentUser.name, time: new Date().toISOString() };
  t.reviews.unshift(review);
  const newRating = +(t.reviews.reduce((s,r) => s+r.stars, 0) / t.reviews.length).toFixed(1);

  try {
    await db.collection('toilets').doc(String(toiletId)).set({
      rating: newRating, reviewCount: t.reviews.length,
      reviews: t.reviews.slice(0, 20),
      cleanliness: t.cleanliness, smell: t.smell, paper: t.paper, soap: t.soap,
      votes: t.votes
    }, { merge: true });
    t.rating = newRating; t.reviewCount = t.reviews.length;
    showToast('✅ 리뷰가 등록됐어요!');
    openDetail(toiletId);
  } catch(e) { showToast('❌ 리뷰 저장 실패'); }
}

// CSV 파싱
function parseCSVLine(line) {
  const result = []; let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') inQuote = !inQuote;
    else if (line[i] === ',' && !inQuote) { result.push(cur); cur = ''; }
    else cur += line[i];
  }
  result.push(cur); return result;
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  document.getElementById('detailPanel').classList.remove('visible');
  selectedId = null;
  document.querySelectorAll('.toilet-card').forEach(c => c.classList.remove('selected'));
}

// ===== URGENT MODE =====
function showUrgentMode() {
  const closest = [...toilets].filter(t => t.open).sort((a, b) => a.distance - b.distance)[0];
  document.getElementById('urgentName').textContent = closest.name;
  document.getElementById('urgentDist').textContent = `📍 ${closest.distance}m · 도보 약 ${Math.round(closest.distance / 80)}분`;
  document.getElementById('urgentOverlay').classList.add('show');
  map.setView([closest.lat, closest.lng], 17);
  setTimeout(() => openDetail(closest.id), 500);
}
function closeUrgent() {
  document.getElementById('urgentOverlay').classList.remove('show');
}

// ===== LOCATE =====
function locateMe() {
  showToast('📍 위치를 확인하는 중...');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 16);
      L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
        radius: 10, fillColor: '#2196f3', color: 'white', weight: 3, fillOpacity: 0.9
      }).addTo(map).bindPopup('📍 내 위치').openPopup();
      showToast('✅ 내 위치를 찾았어요!');
    }, () => showToast('❌ 위치 권한이 필요해요'));
  } else {
    showToast('❌ 이 브라우저는 위치 서비스를 지원하지 않아요');
  }
}

// ===== FILTER =====
function toggleFilter(el, key) {
  if (key === 'all') {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeFilters = new Set(['all']);
    renderList(toilets);
    return;
  }
  document.querySelector('.filter-chip').classList.remove('active');
  el.classList.toggle('active');
  if (el.classList.contains('active')) activeFilters.add(key);
  else activeFilters.delete(key);
  if (activeFilters.size === 0) { activeFilters.add('all'); document.querySelector('.filter-chip').classList.add('active'); renderList(toilets); return; }
  let filtered = toilets;
  if (activeFilters.has('24h')) filtered = filtered.filter(t => t.tags.includes('24h'));
  if (activeFilters.has('disabled')) filtered = filtered.filter(t => t.tags.includes('disabled'));
  if (activeFilters.has('baby')) filtered = filtered.filter(t => t.tags.includes('baby'));
  if (activeFilters.has('clean')) filtered = filtered.filter(t => t.cleanliness >= 80);
  renderList(filtered);
}

// ===== SORT =====
function sortList(by) {
  const sorted = [...toilets].sort((a, b) => {
    if (by === 'distance') return a.distance - b.distance;
    if (by === 'rating') return b.rating - a.rating;
    if (by === 'clean') return b.cleanliness - a.cleanliness;
  });
  renderList(sorted);
}

// ===== SEARCH =====
function handleSearch(val) {
  const filtered = toilets.filter(t =>
    t.name.includes(val) || t.address.includes(val)
  );
  renderList(filtered);
}

// ===== VOTE =====
function vote(el, type) {
  if (el.classList.contains('voted')) return;
  el.classList.add('voted');
  showToast('✅ 투표해주셔서 감사해요!');
}

// ===== UTILS =====
function getStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== STAR PICKER =====
let pickedStars = {};
function pickStar(toiletId, n) {
  pickedStars[toiletId] = n;
  const picker = document.getElementById('starPicker_' + toiletId);
  if (!picker) return;
  picker.querySelectorAll('span').forEach(s => {
    s.style.color = parseInt(s.dataset.star) <= n ? '#ffd93d' : '#ddd';
  });
}

function handleReviewSubmit(toiletId) {
  if (!currentUser) { kakaoLogin(); return; }
  const stars = pickedStars[toiletId] || 0;
  const text = document.getElementById('reviewText_' + toiletId)?.value?.trim();
  if (!stars) { showToast('⭐ 별점을 선택해주세요!'); return; }
  if (!text) { showToast('✏️ 리뷰 내용을 입력해주세요!'); return; }
  submitReview(toiletId, stars, text);
}

// ===== INIT =====
window.onload = initMap;
</script>
</body>
