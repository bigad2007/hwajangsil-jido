<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>화장실 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --green:#1a6b3c; --green-l:#22a75a; --green-pale:#e6f7ed; --green-mid:#b7e4c7;
  --blue:#1971c2; --urgent:#e03131;
  --surface:#ffffff; --surface2:#f8f9fa; --surface3:#f1f3f5;
  --border:#dee2e6; --border-soft:#e9ecef;
  --text:#212529; --text2:#495057; --text3:#868e96;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.08);
  --shadow:0 4px 16px rgba(0,0,0,0.1);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.16);
  --r:12px; --r-sm:8px; --r-lg:20px; --r-full:999px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Pretendard',sans-serif;color:var(--text);overflow:hidden;background:#f0f2f5;}

/* MAP */
#map{position:fixed;inset:0;z-index:1;}

/* ── 상단바 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:12px 16px 0;
  pointer-events:none;
}
.topbar>*{pointer-events:all;}
.tb-row1{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.logo-box{
  display:flex;align-items:center;gap:8px;
  background:var(--green);color:white;
  padding:8px 14px 8px 10px;border-radius:var(--r-full);
  font-size:14px;font-weight:800;white-space:nowrap;
  box-shadow:0 4px 16px rgba(26,107,60,0.4);
  flex-shrink:0;
}
.logo-ico{font-size:17px;line-height:1;}
.logo-sub{font-size:9px;font-weight:500;opacity:0.75;display:block;margin-top:-1px;}
.search-box{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border-soft);
  border-radius:var(--r-full);padding:0 16px;
  box-shadow:var(--shadow);
  transition:border-color 0.2s;
}
.search-box:focus-within{border-color:var(--green);}
.search-ico{color:var(--text3);font-size:15px;flex-shrink:0;}
.search-input{flex:1;border:none;background:transparent;font-family:'Pretendard',sans-serif;font-size:14px;color:var(--text);padding:11px 0;outline:none;}
.search-input::placeholder{color:var(--text3);}
.tb-row2{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tb-row2::-webkit-scrollbar{display:none;}
.filter-pill{
  flex-shrink:0;height:32px;padding:0 13px;border-radius:var(--r-full);
  border:1.5px solid var(--border);background:var(--surface);
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:600;
  color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;
  white-space:nowrap;box-shadow:var(--shadow-sm);transition:all 0.15s;
}
.filter-pill.on{background:var(--green-pale);border-color:var(--green);color:var(--green);}

/* ── 우측 버튼 ── */
.fab-group{
  position:fixed;right:14px;top:50%;transform:translateY(-50%);
  z-index:500;display:flex;flex-direction:column;gap:8px;
}
.fab{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:transform 0.15s,box-shadow 0.15s;
  font-size:18px;
}
.fab:active{transform:scale(0.93);}
.fab-locate{background:var(--surface);}
.fab-locate.loading{animation:rotate 1s linear infinite;}
@keyframes rotate{to{transform:rotate(360deg);}}
.fab-urgent{background:var(--urgent);animation:urgpulse 2s infinite;}
@keyframes urgpulse{0%,100%{box-shadow:0 0 0 0 rgba(224,49,49,0.4)}60%{box-shadow:0 0 0 10px rgba(224,49,49,0)}}
.fab-login{
  background:#FEE500;height:36px;width:auto;padding:0 12px;border-radius:var(--r-full);
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:800;color:#1a1a1a;
}

/* ── 하단 시트 ── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:var(--surface);
  border-radius:var(--r-lg) var(--r-lg) 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,0.1);
  transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  max-height:82vh;display:flex;flex-direction:column;
}
.sheet-collapsed{transform:translateY(calc(100% - 64px));}
.sheet-half{transform:translateY(calc(100% - 260px));}
.sheet-full{transform:translateY(0);}

.sheet-grip{
  padding:10px 16px 6px;cursor:pointer;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  user-select:none;
}
.grip-bar{width:40px;height:4px;background:var(--border);border-radius:var(--r-full);}
.grip-meta{width:100%;display:flex;justify-content:space-between;align-items:center;}
.grip-count{font-size:14px;font-weight:700;}
.grip-hint{font-size:11px;color:var(--text3);}

.sheet-filters{
  display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;
  scrollbar-width:none;flex-shrink:0;
}
.sheet-filters::-webkit-scrollbar{display:none;}
.s-chip{
  flex-shrink:0;height:30px;padding:0 12px;border-radius:var(--r-full);
  border:1.5px solid var(--border);background:var(--surface3);
  font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;
  color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:3px;
}
.s-chip.on{background:var(--green-pale);border-color:var(--green);color:var(--green);}

.sheet-list{overflow-y:auto;flex:1;padding:0 12px 16px;}
.sheet-list::-webkit-scrollbar{width:3px;}
.sheet-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── 카드 ── */
.t-card{
  background:var(--surface);border:1.5px solid var(--border-soft);
  border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;
  transition:all 0.18s;position:relative;overflow:hidden;
}
.t-card::after{
  content:'';position:absolute;left:0;top:12px;bottom:12px;
  width:3px;background:transparent;border-radius:0 3px 3px 0;transition:background 0.2s;
}
.t-card:active,.t-card.sel{border-color:var(--green);background:#fafffe;}
.t-card:active::after,.t-card.sel::after{background:var(--green);}
.tc-r1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.tc-name{font-size:14px;font-weight:700;line-height:1.35;flex:1;}
.tc-dist{font-size:11px;font-weight:700;color:var(--green);background:var(--green-pale);padding:3px 10px;border-radius:var(--r-full);white-space:nowrap;flex-shrink:0;}
.tc-addr{font-size:11.5px;color:var(--text3);margin-bottom:8px;line-height:1.4;}
.tc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.pill{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;line-height:1.6;}
.p24{background:#e3f2fd;color:#1565c0;}
.pdis{background:#f3e5f5;color:#6a1b9a;}
.pbaby{background:#fff8e1;color:#e65100;}
.pccv{background:#e8eaf6;color:#283593;}
.pbell{background:#fce4ec;color:#880e4f;}
.tc-rating{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text3);}
.star-ico{color:#ffc107;}

/* ── 데이터 배지 ── */
.data-badge{
  padding:8px 14px;border-top:1px solid var(--border-soft);
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:5px;
  background:var(--surface3);flex-shrink:0;
}
.data-badge strong{color:var(--green);font-weight:700;}

/* ── 상세 패널 ── */
.detail-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,0.18);
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh;overflow-y:auto;
  /* PC에서는 우측 패널로 */
}
.detail-panel.show{transform:translateY(0);}
.detail-panel::-webkit-scrollbar{width:3px;}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.dp-grip{width:40px;height:4px;background:var(--border);border-radius:var(--r-full);margin:12px auto 0;}
.dp-head{
  padding:14px 18px 16px;
  background:linear-gradient(145deg,var(--green-pale) 0%,var(--surface) 100%);
  border-bottom:1px solid var(--border-soft);
  position:relative;
}
.dp-close{
  position:absolute;top:12px;right:14px;
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(0,0,0,0.07);cursor:pointer;
  font-size:14px;color:var(--text3);display:flex;align-items:center;justify-content:center;
}
.dp-name{font-size:17px;font-weight:800;line-height:1.3;margin-bottom:4px;padding-right:32px;}
.dp-addr{font-size:12px;color:var(--text3);margin-bottom:10px;}
.dp-tags{display:flex;gap:5px;flex-wrap:wrap;}
.dp-body{padding:16px 18px 36px;}

.sec-t{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin:16px 0 10px;}
.sec-t:first-child{margin-top:0;}

.rating-block{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.big-num{font-size:38px;font-weight:900;line-height:1;color:var(--text);}
.stars-lg{font-size:15px;color:#ffc107;margin-bottom:3px;}
.rev-count{font-size:12px;color:var(--text3);}

.vote-block{background:var(--surface3);border-radius:var(--r);padding:12px;margin-bottom:14px;}
.vote-t{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;background:var(--urgent);border-radius:50%;animation:blink 1.3s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.v-item{
  background:var(--surface);border:1.5px solid var(--border-soft);
  border-radius:var(--r-sm);padding:9px 11px;
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:all 0.15s;
}
.v-item:active,.v-item.voted{background:var(--green-pale);border-color:var(--green);color:var(--green);}
.v-count{font-size:13px;font-weight:800;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.ig-item{background:var(--surface3);border-radius:var(--r-sm);padding:10px 12px;}
.ig-l{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;}
.ig-v{font-size:12px;font-weight:700;line-height:1.4;}

.rev-list{margin-bottom:14px;}
.rev-item{border-bottom:1px solid var(--border-soft);padding:10px 0;}
.rev-item:last-child{border-bottom:none;}
.rev-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.rev-stars{font-size:11px;color:#ffc107;}
.rev-name{font-size:11px;font-weight:700;}
.rev-date{font-size:10px;color:var(--text3);margin-left:auto;}
.rev-txt{font-size:12px;line-height:1.6;color:var(--text2);}

.write-form{background:var(--surface3);border-radius:var(--r);padding:13px;margin-bottom:12px;}
.wf-t{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;}
.star-pick{display:flex;gap:7px;margin-bottom:9px;}
.star-pick span{font-size:26px;cursor:pointer;color:#ddd;transition:color 0.1s;line-height:1;}
.star-pick span.on{color:#ffc107;}
.rev-ta{
  width:100%;height:64px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);padding:9px;
  font-family:'Pretendard',sans-serif;font-size:13px;
  resize:none;outline:none;background:var(--surface);color:var(--text);
}
.rev-ta:focus{border-color:var(--green);}
.btn-revsubmit{
  width:100%;background:var(--green);color:white;border:none;
  padding:11px;border-radius:var(--r-sm);
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;margin-top:9px;transition:background 0.15s;
}
.btn-revsubmit:hover{background:var(--green-l);}

.btn-nav-big{
  width:100%;background:var(--green);color:white;border:none;
  padding:15px;border-radius:var(--r);
  font-family:'Pretendard',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(26,107,60,0.3);transition:all 0.15s;
}
.btn-nav-big:hover{background:var(--green-l);}

/* ── 길찾기 패널 ── */
.route-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:700;
  background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,0.18);
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  max-height:72vh;display:flex;flex-direction:column;
}
.route-panel.show{transform:translateY(0);}
.rp-grip{width:40px;height:4px;background:var(--border);border-radius:var(--r-full);margin:12px auto 0;}
.rp-head{
  padding:10px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-soft);flex-shrink:0;
}
.rp-title{font-size:14px;font-weight:800;color:var(--green);}
.rp-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);}

.mode-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border-soft);flex-shrink:0;}
.mode-btn{
  flex:1;padding:10px 0;border:1.5px solid var(--border);
  border-radius:var(--r-sm);background:var(--surface3);
  font-family:'Pretendard',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text3);transition:all 0.15s;
}
.mode-btn span{font-size:19px;}
.mode-btn.on{border-color:var(--green);background:var(--green-pale);color:var(--green);}

.rt-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border-soft);flex-shrink:0;}
.rt-s{background:var(--surface3);border-radius:var(--r-sm);padding:11px 13px;}
.rt-s-l{font-size:10px;color:var(--text3);font-weight:500;}
.rt-s-v{font-size:22px;font-weight:900;color:var(--text);line-height:1.1;}
.rt-s-u{font-size:11px;color:var(--text3);}

.rt-steps{overflow-y:auto;padding:0 16px 28px;flex:1;}
.rt-steps::-webkit-scrollbar{width:3px;}
.rt-steps::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.step-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-soft);}
.step-item:last-child{border-bottom:none;}
.step-ico-box{
  width:30px;height:30px;border-radius:50%;background:var(--green-pale);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.step-content{flex:1;}
.step-txt{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);}
.step-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── 긴급 모드 ── */
.urgent-screen{
  display:none;position:fixed;inset:0;z-index:9000;
  background:linear-gradient(160deg,#c92a2a 0%,#e03131 100%);
  align-items:center;justify-content:center;flex-direction:column;
  gap:12px;padding:30px;text-align:center;
}
.urgent-screen.show{display:flex;}
.us-emoji{font-size:64px;animation:shk 0.4s infinite;}
@keyframes shk{0%,100%{transform:rotate(-8deg) scale(1.05)}50%{transform:rotate(8deg) scale(1.05)}}
.us-title{font-size:24px;font-weight:900;color:white;}
.us-name{font-size:20px;font-weight:700;color:rgba(255,255,255,0.92);}
.us-dist{font-size:14px;color:rgba(255,255,255,0.75);}
.us-close{
  margin-top:12px;background:white;color:var(--urgent);border:none;
  padding:14px 36px;border-radius:var(--r-full);
  font-family:'Pretendard',sans-serif;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(33,37,41,0.92);color:white;
  padding:10px 22px;border-radius:var(--r-full);
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:all 0.28s;z-index:9999;
  white-space:nowrap;backdrop-filter:blur(8px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 로딩 ── */
.loading{
  position:fixed;inset:0;background:rgba(255,255,255,0.94);
  z-index:8000;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;backdrop-filter:blur(4px);
}
.spin{width:42px;height:42px;border:4px solid var(--green-mid);border-top-color:var(--green);border-radius:50%;animation:sp 0.75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.load-txt{font-size:14px;font-weight:700;color:var(--green);}
.load-sub{font-size:12px;color:var(--text3);}

/* PC 레이아웃 */
@media(min-width:768px){
  .sheet{width:340px;height:100vh;max-height:100vh;border-radius:0;top:0;right:auto;left:0;transform:none !important;box-shadow:2px 0 24px rgba(0,0,0,0.1);}
  .sheet-collapsed,.sheet-half,.sheet-full{transform:none !important;}
  .sheet-grip{display:none;}
  .sheet-list{flex:1;}
  .fab-group{right:14px;}
  #map{left:340px;}
  .topbar{left:350px;}
  .detail-panel{
    left:350px;right:auto;width:340px;top:0;max-height:100vh;
    border-radius:0;box-shadow:2px 0 24px rgba(0,0,0,0.1);
  }
  .detail-panel.show{transform:translateY(0);}
  .route-panel{left:350px;right:auto;width:340px;max-height:100vh;border-radius:0;top:0;}
  .route-panel.show{transform:translateY(0);}
}

/* leaflet 기본 UI 숨김 */
.leaflet-routing-container{display:none!important;}
</style>
</head>
<body>
<div id="map"></div>

<!-- 상단바 -->
<div class="topbar">
  <div class="tb-row1">
    <div class="logo-box">
      <span class="logo-ico">🚻</span>
      <div>화장실 지도<span class="logo-sub">전국 공중화장실</span></div>
    </div>
    <div class="search-box">
      <span class="search-ico">🔍</span>
      <input class="search-input" placeholder="화장실명, 주소 검색" id="searchInp" oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="tb-row2">
    <div class="filter-pill on" onclick="setFilter('all',this)">전체</div>
    <div class="filter-pill" onclick="setFilter('24h',this)">🌙 24시간</div>
    <div class="filter-pill" onclick="setFilter('disabled',this)">♿ 장애인</div>
    <div class="filter-pill" onclick="setFilter('baby',this)">👶 기저귀</div>
    <div class="filter-pill" onclick="setFilter('cctv',this)">📹 CCTV</div>
    <div class="filter-pill" onclick="setFilter('bell',this)">🔔 비상벨</div>
  </div>
</div>

<!-- FAB 버튼 -->
<div class="fab-group">
  <button class="fab fab-locate" id="locBtn" onclick="locateMe()" title="내 위치">📍</button>
  <button class="fab fab-urgent" onclick="showUrgent()">🚨</button>

<script>
// ── Firebase ──
const FB_CFG = {

  messagingSenderId:"359899240185",

};
const KAKAO_KEY = 'a08fe69a1355d47b0e5e2a4b337cfd5b';
let db;
try { firebase.initializeApp(FB_CFG); db = firebase.firestore(); } catch(e){}

// ── 카카오 SDK ──
async function loadKakao() {

  await new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
    s.crossOrigin = 'anonymous';
    s.onload = () => { tryInitKakao(); resolve(); };

      const s2 = document.createElement('script');

      s2.onload = () => { tryInitKakao(); resolve(); };
      s2.onerror = () => resolve();
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });
}
function tryInitKakao() {
  if (window.Kakao && !Kakao.isInitialized()) {
    Kakao.init(KAKAO_KEY);
    console.log('✅ 카카오 SDK 초기화 완료');

}
loadKakao();

// ── 상태 ──
let map, routeCtrl = null;
let uLat = 37.5550, uLng = 126.9707;
let userCircle = null, userPulse = null;
let currentUser = null, selT = null, selStars = 0, curMode = 'walk';
let allData = [], nearList = [], dispList = [];
let dotLayer = null, mrkLayer = [];
let curFilter = 'all', curSort = 'dist';
let sheetMode = 'half';
let isLocating = false;

// ── 카카오 로그인 ──
async function kakaoLogin() {
  if (currentUser) { kakaoLogout(); return; }

function kakaoLogout() {

    currentUser = null;
    document.getElementById('loginBtn').textContent = '로그인';

// ── 지도 초기화 ──
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: true })
    .setView([36.5, 127.8], 7);

  // 고품질 지도 타일 (건물 상세히 보임)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
    minZoom: 5
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend moveend', renderByZoom);
  setTimeout(loadData, 150);
}

// ── 데이터 로드 ──
function loadData() {
  try {
    if (typeof TOILET_DATA === 'undefined') throw new Error('no data');
    allData = TOILET_DATA.map(t => ({
      id:t.i, name:t.n, address:t.a, lat:t.la, lng:t.ln,
      hours:t.h, is24h:t.t===1, disabled:t.d===1, baby:t.b===1, cctv:t.c===1, bell:t.e===1,
      rating:0, reviewCnt:0, reviews:[], votes:{paper:0,soap:0,smell:0,queue:0}
    }));
    document.getElementById('loading').style.display = 'none';
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => { uLat=p.coords.latitude; uLng=p.coords.longitude; onLocated(); },
        () => onLocated()
      );
    } else onLocated();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showToast('❌ toilets_data.js 파일도 GitHub에 올려주세요!');
  }
}

function onLocated() {
  map.setView([uLat, uLng], 16);
  placeUserMarker();
  updateNearby();
  renderByZoom();
}

// ── 내 위치 마커 (중복 방지) ──
function placeUserMarker() {
  // 기존 마커 제거
  if (userCircle) { map.removeLayer(userCircle); userCircle = null; }
  if (userPulse) { map.removeLayer(userPulse); userPulse = null; }

  // 파란 점 + 펄스 효과
  userPulse = L.circleMarker([uLat, uLng], {
    radius: 18, fillColor: '#2196f3', color: 'transparent',
    fillOpacity: 0.15, weight: 0
  }).addTo(map);

  userCircle = L.circleMarker([uLat, uLng], {
    radius: 9, fillColor: '#2196f3', color: 'white',
    weight: 2.5, fillOpacity: 1
  }).addTo(map).bindPopup('<b>📍 내 위치</b>');
}

// ── 내 위치 버튼 (중복 방지) ──
function locateMe() {
  if (isLocating) return;
  isLocating = true;
  const btn = document.getElementById('locBtn');
  btn.classList.add('loading');
  showToast('📍 위치 확인 중...');

  navigator.geolocation.getCurrentPosition(
    p => {
      uLat = p.coords.latitude; uLng = p.coords.longitude;
      map.setView([uLat, uLng], 17);
      placeUserMarker();
      updateNearby();
      showToast('✅ 내 위치를 찾았어요!');
      btn.classList.remove('loading');
      isLocating = false;
    },
    () => {
      showToast('❌ 위치 권한을 허용해주세요');
      btn.classList.remove('loading');
      isLocating = false;
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── 주변 목록 업데이트 ──
function updateNearby() {
  nearList = allData.map(t => ({
    ...t, dist: Math.round(calcDist(uLat, uLng, t.lat, t.lng))
  })).sort((a,b) => a.dist - b.dist);

  const near5 = nearList.filter(t => t.dist <= 5000).slice(0, 50);
  renderList(near5);

  if (db) loadFBReviews(near5.slice(0, 20));
}

async function loadFBReviews(list) {
  try {
    const ids = list.map(t => String(t.id));
    for (let i = 0; i < ids.length; i += 10) {
      const snap = await db.collection('toilets')
        .where(firebase.firestore.FieldPath.documentId(), 'in', ids.slice(i, i+10)).get();
      snap.forEach(doc => {
        const t = allData.find(x => String(x.id) === doc.id);
        if (t) { const d = doc.data(); t.rating=d.rating||0; t.reviewCnt=d.reviewCount||0; t.reviews=d.reviews||[]; t.votes=d.votes||{}; }
      });
    }
  } catch(e) { console.warn('FB:', e); }
}

// ── 줌 기반 렌더링 ──
function renderByZoom() {
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  clearMarkers();

  let filtered = curFilter === 'all' ? allData : allData.filter(t => {
    if (curFilter === '24h') return t.is24h;
    if (curFilter === 'disabled') return t.disabled;
    if (curFilter === 'baby') return t.baby;
    if (curFilter === 'cctv') return t.cctv;
    if (curFilter === 'bell') return t.bell;
    return true;
  });

  if (zoom >= 15) {
    const vis = filtered.filter(t => bounds.contains([t.lat, t.lng])).slice(0, 120);
    renderMarkers(vis);
  } else if (zoom >= 13) {
    renderDots(filtered.filter(t => bounds.contains([t.lat, t.lng])).slice(0, 500), 5);
  } else if (zoom >= 10) {
    renderDots(filtered, 3.5);
  } else {
    renderDots(filtered, 2);
  }
}

function clearMarkers() {
  mrkLayer.forEach(m => map.removeLayer(m));
  mrkLayer = [];
  if (dotLayer) { map.removeLayer(dotLayer); dotLayer = null; }
}

function renderMarkers(data) {
  data.forEach(t => {
    const color = t.rating>=4?'#1a6b3c':t.rating>=3?'#e67700':t.rating>0?'#c92a2a':'#495057';
    const icon = L.divIcon({
      className: '',
      html: `<div style="position:relative;width:32px;height:38px">
        <div style="width:32px;height:32px;background:${color};border:3px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;">
          <span style="transform:rotate(45deg);font-size:13px;line-height:1">🚻</span>
        </div>
      </div>`,
      iconSize: [32, 38], iconAnchor: [16, 38]
    });
    const m = L.marker([t.lat, t.lng], { icon }).addTo(map);
    m.on('click', () => openDetail(t.id));
    mrkLayer.push(m);
  });
}

function renderDots(data, size) {
  const renderer = L.canvas({ padding: 0.5 });
  const group = L.layerGroup();
  data.forEach(t => {
    const color = t.rating>=4?'#1a6b3c':t.rating>=3?'#e67700':t.rating>0?'#c92a2a':'#4a90d9';
    const c = L.circleMarker([t.lat, t.lng], {
      radius: size, fillColor: color, color: 'rgba(255,255,255,0.6)',
      weight: size > 4 ? 1.5 : 0.8, fillOpacity: 0.8, renderer
    });
    c.on('click', () => map.setView([t.lat, t.lng], 15));
    group.addLayer(c);
  });
  dotLayer = group.addTo(map);
}

// ── 목록 렌더링 ──
function renderList(data) {
  dispList = data;
  document.getElementById('cntEl').textContent = data.length;
  const el = document.getElementById('sheetList');
  el.innerHTML = '';
  if (!data.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px;font-size:13px;color:var(--text3)">검색 결과가 없어요</div>';
    return;
  }
  data.forEach(t => {
    const d = document.createElement('div');
    d.className = 't-card'; d.id = `c-${t.id}`;
    d.onclick = () => { openDetail(t.id); map.setView([t.lat, t.lng], 17); collapseSheet(); };
    const dt = t.dist>=1000?(t.dist/1000).toFixed(1)+'km':t.dist+'m';
    d.innerHTML = `
      <div class="tc-r1"><div class="tc-name">${t.name}</div><div class="tc-dist">${dt}</div></div>
      <div class="tc-addr">📍 ${t.address}</div>
      <div class="tc-tags">
        ${t.is24h?'<span class="pill p24">🌙 24시간</span>':''}
        ${t.disabled?'<span class="pill pdis">♿ 장애인</span>':''}
        ${t.baby?'<span class="pill pbaby">👶 기저귀</span>':''}
        ${t.cctv?'<span class="pill pccv">📹 CCTV</span>':''}
        ${t.bell?'<span class="pill pbell">🔔 비상벨</span>':''}
      </div>
      <div class="tc-rating">
        ${t.rating>0?`<span class="star-ico">★</span> <b>${t.rating}</b> <span>(${t.reviewCnt}개 리뷰)</span>`:'<span>리뷰 없음</span>'}
      </div>`;
    el.appendChild(d);
  });
}

// ── 시트 제어 ──
function toggleSheet() {

  if (sheetMode === 'half') { s.className='sheet sheet-full'; sheetMode='full'; }
  else if (sheetMode === 'full') { s.className='sheet sheet-collapsed'; sheetMode='collapsed'; }

// ── 상세 패널 ──
function openDetail(id) {
  const t = allData.find(x => x.id === id);

  if (!t.dist) t.dist = Math.round(calcDist(uLat, uLng, t.lat, t.lng));

  const r = t.rating;

  document.getElementById('dpTags').innerHTML = `
    ${t.is24h?'<span class="pill p24">🌙 24시간</span>':''}

    ${t.baby?'<span class="pill pbaby">👶 기저귀</span>':''}
    ${t.cctv?'<span class="pill pccv">📹 CCTV</span>':''}
    ${t.bell?'<span class="pill pbell">🔔 비상벨</span>':''}

  const v = t.votes || {};
  document.getElementById('voteGrid').innerHTML = `
    <div class="v-item" onclick="doVote(this,'paper')"><span>🧻 휴지있음</span><span class="v-count">${v.paper||0}</span></div>
    <div class="v-item" onclick="doVote(this,'soap')"><span>🧼 비누있음</span><span class="v-count">${v.soap||0}</span></div>
    <div class="v-item" onclick="doVote(this,'smell')"><span>😷 냄새남</span><span class="v-count">${v.smell||0}</span></div>
    <div class="v-item" onclick="doVote(this,'queue')"><span>🚶 줄있음</span><span class="v-count">${v.queue||0}</span></div>
  `;

  const dt = t.dist>=1000?(t.dist/1000).toFixed(1)+'km':t.dist+'m';
  document.getElementById('infoGrid').innerHTML = `
    <div class="ig-item"><div class="ig-l">운영시간</div><div class="ig-v">${t.hours||'정보없음'}</div></div>
    <div class="ig-item"><div class="ig-l">거리</div><div class="ig-v">${dt}</div></div>
    <div class="ig-item"><div class="ig-l">장애인 시설</div><div class="ig-v">${t.disabled?'✅ 있음':'❌ 없음'}</div></div>
    <div class="ig-item"><div class="ig-l">기저귀교환대</div><div class="ig-v">${t.baby?'✅ 있음':'❌ 없음'}</div></div>
    <div class="ig-item"><div class="ig-l">CCTV</div><div class="ig-v">${t.cctv?'✅ 있음':'❌ 없음'}</div></div>
    <div class="ig-item"><div class="ig-l">비상벨</div><div class="ig-v">${t.bell?'✅ 있음':'❌ 없음'}</div></div>
  `;

  const revs = t.reviews || [];
  document.getElementById('revList').innerHTML = revs.length
    ? revs.slice(0,5).map(rev=>`
      <div class="rev-item">
        <div class="rev-top">
          <span class="rev-stars">${'★'.repeat(rev.stars)+'☆'.repeat(5-rev.stars)}</span>
          <span class="rev-name">${rev.author||'익명'}</span>
          <span class="rev-date">${fmtDate(rev.time)}</span>
        </div>
        <div class="rev-txt">${rev.text}</div>
      </div>`).join('')
    : '<div style="font-size:12px;color:var(--text3);padding:6px 0">첫 리뷰를 남겨보세요!</div>';

  selStars = 0;
  document.querySelectorAll('#starPick span').forEach(s=>s.classList.remove('on'));
  document.getElementById('revTa').value = '';
  document.getElementById('revBtn').textContent = currentUser ? '리뷰 등록' : '카카오 로그인 후 작성';
  document.getElementById('btnNav').onclick = () => startRoute(t);

  document.getElementById('detailPanel').classList.add('show');
}
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  selT = null;
}

// ── 길찾기 (횡단보도 포함 OSRM) ──
function startRoute(t) {
  if (!t) return;
  selT = t; closeDetail();
  document.getElementById('rpTitle').textContent = `🗺️ ${t.name}`;
  document.getElementById('routePanel').classList.add('show');
  doRoute(t, curMode);
}

function doRoute(t, mode) {
  if (routeCtrl) { map.removeControl(routeCtrl); routeCtrl = null; }

  // OSRM profile
  const osrmProfile = { walk:'foot', bike:'cycling', car:'driving' };
  const routeColors = { walk:'#1a6b3c', bike:'#e67700', car:'#1971c2' };
  const speeds = { walk:75, bike:200, car:500 };

  document.getElementById('rtSteps').innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:16px">경로 계산 중...</div>';

  routeCtrl = L.Routing.control({
    waypoints: [L.latLng(uLat, uLng), L.latLng(t.lat, t.lng)],
    router: L.Routing.osrmv1({
      serviceUrl: 'https://router.project-osrm.org/route/v1',
      profile: osrmProfile[mode],
      // 횡단보도/보행자 경로 포함
      useHints: false
    }),
    show: false, addWaypoints: false,
    fitSelectedRoutes: true, routeWhileDragging: false,
    createMarker: (i, wp) => {
      if (i === 0) return L.circleMarker(wp.latLng, {
        radius:10, fillColor:'#2196f3', color:'white', weight:2.5, fillOpacity:1
      }).bindPopup('<b>📍 내 위치</b>');
      const ico = L.divIcon({
        className:'',
        html:`<div style="background:var(--green);color:white;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:800;box-shadow:0 3px 10px rgba(0,0,0,0.25);white-space:nowrap">🚻 ${t.name}</div>`,
        iconAnchor:[0,0]
      });
      return L.marker(wp.latLng, {icon:ico});
    },
    lineOptions: {
      styles: [
        {color:'white', weight:8, opacity:0.85},
        {color: routeColors[mode], weight:5, opacity:1}
      ]
    }
  }).addTo(map);

  routeCtrl.on('routesfound', e => {
    const r = e.routes[0];
    const distM = Math.round(r.summary.totalDistance);
    const timeSec = Math.round(r.summary.totalTime);
    const timeMin = Math.max(1, Math.round(timeSec / 60));

    document.getElementById('rtTime').textContent = timeMin;
    document.getElementById('rtDist').textContent = distM >= 1000 ? (distM/1000).toFixed(1) : distM;
    document.getElementById('rtUnit').textContent = distM >= 1000 ? 'km' : 'm';

    // 경로 단계 렌더링
    const steps = r.instructions || [];
    const icons = {
      'Straight':'⬆️', 'SlightRight':'↗️', 'Right':'➡️', 'SharpRight':'↘️',
      'Uturn':'↩️', 'SharpLeft':'↙️', 'Left':'⬅️', 'SlightLeft':'↖️',
      'Roundabout':'🔄', 'DestinationReached':'🚻', 'WaypointReached':'📍',
      'Head':'⬆️', 'Enter Roundabout':'🔄', 'Exit Roundabout':'↪️',
      'Fork':'🔀'
    };

    if (!steps.length) {
      document.getElementById('rtSteps').innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px">경로 안내를 불러왔어요.</div>';
      return;
    }

    document.getElementById('rtSteps').innerHTML = steps.map((s, idx) => {
      const d = s.distance >= 1000 ? (s.distance/1000).toFixed(1)+'km' : Math.round(s.distance)+'m';
      const ico = icons[s.type] || '➡️';
      const isLast = idx === steps.length - 1;
      return `<div class="step-item">
        <div class="step-ico-box" style="${isLast?'background:var(--green-pale)':''}">${ico}</div>
        <div class="step-content">
          <div class="step-txt">${s.text}</div>
          <div class="step-sub">${d}${s.time ? ` · 약 ${Math.round(s.time/60)}분` : ''}</div>
        </div>
      </div>`;
    }).join('');
  });

  routeCtrl.on('routingerror', () => {
    if (routeCtrl) { map.removeControl(routeCtrl); routeCtrl = null; }
    const d = Math.round(calcDist(uLat, uLng, t.lat, t.lng));
    const tm = Math.round(d / speeds[mode]);
    document.getElementById('rtTime').textContent = tm;
    document.getElementById('rtDist').textContent = d >= 1000 ? (d/1000).toFixed(1) : d;
    document.getElementById('rtUnit').textContent = d >= 1000 ? 'km' : 'm';

    // 직선 경로 표시
    L.polyline([[uLat,uLng],[t.lat,t.lng]], {
      color: routeColors[mode], weight:5, opacity:0.75, dashArray:'10,8'
    }).addTo(map);
    map.fitBounds([[uLat,uLng],[t.lat,t.lng]], {padding:[60,80]});

    document.getElementById('rtSteps').innerHTML = `
      <div class="step-item">
        <div class="step-ico-box">📡</div>
        <div class="step-content">
          <div class="step-txt">상세 경로 안내가 어려워 직선으로 표시했어요</div>
          <div class="step-sub">거리 ${d>=1000?(d/1000).toFixed(1)+'km':d+'m'} · 예상 ${tm}분</div>
        </div>
      </div>`;
  });
}

function setMode(mode, btn) {
  curMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if (selT) doRoute(selT, mode);
}

function closeRoute() {
  document.getElementById('routePanel').classList.remove('show');
  if (routeCtrl) { map.removeControl(routeCtrl); routeCtrl = null; }
}

// ── 긴급 ──
function showUrgent() {
  const c = nearList[0];
  if (!c) { showToast('❌ 주변 화장실이 없어요'); return; }
  document.getElementById('usName').textContent = c.name;
  const d = c.dist>=1000?(c.dist/1000).toFixed(1)+'km':c.dist+'m';
  document.getElementById('usDist').textContent = `📍 ${d} · 도보 약 ${Math.max(1,Math.round(c.dist/75))}분`;
  document.getElementById('urgScreen').classList.add('show');
  map.setView([c.lat, c.lng], 17);
  setTimeout(() => openDetail(c.id), 350);
}

// ── 검색 ──
function handleSearch(val) {
  if (!val.trim()) { updateNearby(); return; }
  const q = val.trim();
  const res = allData
    .filter(t => t.name.includes(q) || t.address.includes(q))
    .map(t => ({...t, dist: Math.round(calcDist(uLat, uLng, t.lat, t.lng))}))
    .sort((a,b) => a.dist-b.dist).slice(0, 50);
  renderList(res);
}

// ── 필터 ──
function setFilter(key, el) {
  curFilter = key;
  document.querySelectorAll('.filter-pill').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderByZoom();
  // 목록도 업데이트
  let list = nearList.filter(t => t.dist <= 5000).slice(0, 50);
  if (key !== 'all') list = list.filter(t => {
    if (key==='24h') return t.is24h;
    if (key==='disabled') return t.disabled;
    if (key==='baby') return t.baby;
    if (key==='cctv') return t.cctv;
    if (key==='bell') return t.bell;
  });
  renderList(list);
}

// ── 정렬 ──
function setSortChip(by, el) {
  document.querySelectorAll('.s-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  curSort = by;
  const s = [...dispList].sort((a,b)=>{
    if (by==='dist') return a.dist-b.dist;
    if (by==='rating') return b.rating-a.rating;
    if (by==='name') return a.name.localeCompare(b.name,'ko');
    return 0;
  });
  renderList(s);
}

// ── 리뷰 ──
function pickStar(n) {
  selStars = n;
  document.querySelectorAll('#starPick span').forEach(s=>s.classList.toggle('on', parseInt(s.dataset.n)<=n));
}
async function submitRev() {
  if (!currentUser) { kakaoLogin(); return; }
  if (!selT || !selStars) { showToast('⭐ 별점을 선택해주세요!'); return; }
  const txt = document.getElementById('revTa').value.trim();
  if (!txt) { showToast('✏️ 내용을 입력해주세요!'); return; }

  const rev = {stars:selStars, text:txt, author:currentUser.name, time:new Date().toISOString()};
  selT.reviews.unshift(rev);
  const nr = +(selT.reviews.reduce((s,r)=>s+r.stars,0)/selT.reviews.length).toFixed(1);
  selT.rating = nr; selT.reviewCnt = selT.reviews.length;

  if (db) {
    try {
      await db.collection('toilets').doc(String(selT.id)).set({
        rating:nr, reviewCount:selT.reviews.length,
        reviews:selT.reviews.slice(0,20), votes:selT.votes
      }, {merge:true});
    } catch(e) {}
  }
  showToast('✅ 리뷰 등록됐어요!');
  openDetail(selT.id);
}

function doVote(el, type) {
  if (el.classList.contains('voted')) return;
  el.classList.add('voted');
  if (selT) {
    selT.votes = selT.votes || {};
    selT.votes[type] = (selT.votes[type]||0) + 1;
    if (db) db.collection('toilets').doc(String(selT.id)).set({votes:selT.votes},{merge:true}).catch(()=>{});
  }
  showToast('✅ 투표 완료!');
}

// ── 유틸 ──
function calcDist(la1,ln1,la2,ln2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  return R*2*Math.atan2(Math.sqrt(Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2),Math.sqrt(1-Math.sin(dLa/2)**2-Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2));
}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('ko-KR');}catch{return '';}}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.onload = initMap;
</script>
